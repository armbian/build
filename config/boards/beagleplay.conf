# BeaglePlay Texas Instruments AM62 quad core 2GB DDR4 eMMC GBE SPE HDMI

BOARD_NAME="BeaglePlay"
BOARD_VENDOR="beagleboard"
BOARDFAMILY="k3"
BOARD_MAINTAINER="Grippy98"
INTRODUCED="2023"
BOOT_SOC="am62"
BOOTCONFIG="am62x_beagleplay_a53_defconfig"
BOOTFS_TYPE="fat"
BOOT_FDT_FILE="ti/k3-am625-beagleplay.dts"
TIBOOT3_BOOTCONFIG="am62x_beagleplay_r5_defconfig"
TIBOOT3_FILE="tiboot3-am62x-gp-evm.bin"
TISPL_FILE="tispl.bin_unsigned"
UBOOT_FILE="u-boot.img_unsigned"
DEFAULT_CONSOLE="serial"
KERNEL_TARGET="vendor,vendor-rt,edge"
KERNEL_TEST_TARGET="vendor"
SERIALCON="ttyS2"
ATF_PLAT="k3"
ATF_BOARD="lite"
OPTEE_ARGS="CFG_TEE_CORE_LOG_LEVEL=1"
OPTEE_PLATFORM="k3-am62x"
TI_DEBPKGS_FALLBACK_SUITES=("noble" "jammy")
TI_PACKAGES+=(
	"ti-img-rogue-driver-am62-dkms"
	"ti-img-rogue-umlibs-am62"
	"ti-img-rogue-tools-am62"
	"ti-img-rogue-firmware-am62"
	"gstreamer1.0-tools"
	"gstreamer1.0-plugins-good"
	"gstreamer1.0-plugins-bad"
	"gstreamer1.0-plugins-base"
)
if [[ "${RELEASE}" == "bookworm" || "${RELEASE}" == "jammy" ]]; then
	TI_PACKAGES+=("mesa-vulkan-drivers" "libgl1-mesa-dri")
fi
