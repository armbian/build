# PocketBeagle 2 Texas Instruments AM62 dual core 512MB USB2 DDR4

BOARD_NAME="PocketBeagle 2"
BOARD_VENDOR="beagleboard"
BOARDFAMILY="k3-beagle"
BOARD_MAINTAINER="Grippy98"
INTRODUCED="2025"
BOOT_SOC="am62"
BOOTCONFIG="am6232_pocketbeagle2_a53_defconfig"
BOOTFS_TYPE="fat"
TIBOOT3_BOOTCONFIG="am6232_pocketbeagle2_r5_defconfig"
TIBOOT3_FILE="tiboot3-am62x-hs-fs-evm.bin"
DEFAULT_CONSOLE="serial"
KERNEL_TARGET="vendor,vendor-rt"
KERNEL_TEST_TARGET="vendor"
SERIALCON="ttyS2,ttyGS0"
ATF_PLAT="k3"
ATF_BOARD="lite"
SRC_EXTLINUX="yes"
SRC_CMDLINE="root=/dev/mmcblk1p2 rootwait console=ttyS2,115200n8 console=ttyGS0,115200n8"
BOOT_FDT_FILE="ti/k3-am6232-pocketbeagle2.dtb"
OPTEE_PLATFORM="k3-am62x"

function post_family_tweaks_bsp__pocketbeagle2_usb_gadget() {
	display_alert "$BOARD" "Installing NCM+ACM USB gadget" "info"

	install -Dm755 "$SRC/packages/bsp/pocketbeagle2-usb-gadget/pb2-usb-gadget-ncm-acm" \
		"$destination/usr/local/sbin/pb2-usb-gadget-ncm-acm"

	install -Dm644 "$SRC/packages/bsp/pocketbeagle2-usb-gadget/pb2-usb-gadget.service" \
		"$destination/usr/lib/systemd/system/pb2-usb-gadget.service"

	install -Dm644 "$SRC/packages/bsp/pocketbeagle2-usb-gadget/90-usb0-pb2-ncm.network" \
		"$destination/usr/lib/systemd/network/90-usb0-pb2-ncm.network"

	install -Dm600 "$SRC/packages/bsp/pocketbeagle2-usb-gadget/pb2-usb0-static.nmconnection" \
		"$destination/etc/NetworkManager/system-connections/pb2-usb0-static.nmconnection"

	install -Dm644 "$SRC/packages/bsp/pocketbeagle2-usb-gadget/serial-getty-ttyGS0-pb2.conf" \
		"$destination/usr/lib/systemd/system/serial-getty@ttyGS0.service.d/10-pb2-usb-gadget.conf"
}

function post_family_tweaks__pocketbeagle2_enable_usb_gadget() {
	display_alert "$BOARD" "Enabling NCM+ACM USB gadget" "info"

	chroot_sdcard chmod 600 /etc/NetworkManager/system-connections/pb2-usb0-static.nmconnection
	chroot_sdcard setcap cap_net_raw+ep /usr/bin/ping || chroot_sdcard chmod u+s /usr/bin/ping
	chroot_sdcard systemctl --no-reload enable pb2-usb-gadget.service
	chroot_sdcard systemctl --no-reload enable serial-getty@ttyGS0.service
}
