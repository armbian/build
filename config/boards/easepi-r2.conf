# Rockchip RK3588 octa core 8-32GB SoC 4x2.5GBe eMMC USB3 NVMe SATA
BOARD_NAME="EasePi-R2"
BOARD_VENDOR="LinkEase"
BOARDFAMILY="rockchip-rk3588"
BOARD_MAINTAINER="ifroncy01"
INTRODUCED="2026"
BOOTCONFIG="easepi-r2-rk3588_defconfig"
KERNEL_TARGET="current,edge,bleedingedge,vendor"
KERNEL_TEST_TARGET="current,vendor"
FULL_DESKTOP="yes"
BOOT_LOGO="desktop"
BOOT_FDT_FILE="rockchip/rk3588-easepi-r2.dtb"
BOOT_SCENARIO="spl-blobs"
BOOTFS_TYPE=fat
BOOTSIZE=256
IMAGE_PARTITION_TABLE="gpt"
BOOT_ENV_FILE="armbianEnv.txt"

function post_family_config__easepi-r2_use_mainline_uboot_except_vendor() {
	if [[ "${BRANCH}" == "vendor" ]]; then
		display_alert "$BOARD" "Vendor U-Boot overrides for $BOARD - $BRANCH" "info"
		return 0
	fi

	display_alert "$BOARD" "Mainline U-Boot overrides for $BOARD - $BRANCH" "info"
	declare -g BOOTSOURCE="https://github.com/u-boot/u-boot"
	declare -g BOOTBRANCH="tag:v2025.10"
	declare -g BOOTPATCHDIR="v2025.10"
	declare -g BOOTDIR="u-boot-${BOARD}"
	declare -g UBOOT_TARGET_MAP="BL31=${RKBIN_DIR}/${BL31_BLOB} ROCKCHIP_TPL=${RKBIN_DIR}/${DDR_BLOB};;u-boot-rockchip.bin"
	unset uboot_custom_postprocess write_uboot_platform write_uboot_platform_mtd

	function write_uboot_platform() {
		dd "if=$1/u-boot-rockchip.bin" "of=$2" bs=32k seek=1 conv=notrunc status=none
	}
}

function extension_prepare_config__easepi-r2-peripherals() {
	display_alert "EasePi-R2" "Peripherals extension (IR + Bluetooth) prepared" "info"
}

function post_family_config__easepi_r2_add_bluetooth_packages() {
	display_alert "EasePi-R2" "Adding bluetooth packages to image" "info"
	add_packages_to_image rfkill bluetooth bluez bluez-tools
}

function post_family_config__easepi_r2_add_ir_packages() {
	display_alert "EasePi-R2" "Adding IR packages to image" "info"
	add_packages_to_image i2c-tools ir-keytable
}

function post_family_tweaks_bsp__easepi_r2_bluetooth_hciattach() {
	display_alert "EasePi-R2" "Installing bluetooth hciattach files from BSP" "info"

	install -D -m 0755 "${SRC}/packages/bsp/easepi/common/bluetooth-hciattach.sh" \
		"${destination}/usr/local/sbin/bluetooth-hciattach.sh"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/common/bluetooth-hciattach.service" \
		"${destination}/lib/systemd/system/bluetooth-hciattach.service"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/easepi-r2/easepi-bt.conf" \
		"${destination}/etc/default/easepi-bt"
}

function pre_customize_image__easepi_r2_bluetooth_firmware() {
	display_alert "EasePi-R2" "Setting up Bluetooth firmware symlinks" "info"

	if [ -f "${SDCARD}"/lib/firmware/brcm/BCM4345C0.hcd ]; then
		ln -sf BCM4345C0.hcd "${SDCARD}"/lib/firmware/brcm/BCM4345C0.easepi,r2.hcd || true
	fi

	if [ -f "${SDCARD}"/lib/firmware/brcm/brcmfmac43455-sdio.bin ]; then
		ln -sf brcmfmac43455-sdio.bin "${SDCARD}"/lib/firmware/brcm/brcmfmac43455-sdio.easepi,r2.bin || true
	fi

	if [ -f "${SDCARD}"/lib/firmware/brcm/brcmfmac43455-sdio.txt ]; then
		ln -sf brcmfmac43455-sdio.txt "${SDCARD}"/lib/firmware/brcm/brcmfmac43455-sdio.easepi,r2.txt || true
	fi

	if [ -f "${SDCARD}"/lib/firmware/brcm/brcmfmac43455-sdio.clm_blob ]; then
		ln -sf brcmfmac43455-sdio.clm_blob "${SDCARD}"/lib/firmware/brcm/brcmfmac43455-sdio.easepi,r2.clm_blob || true
	fi
}

function post_family_tweaks_bsp__easepi_r2_eth_order() {
	display_alert "EasePi-R2" "Installing Ethernet order assets from BSP" "info"

	install -D -m 0755 "${SRC}/packages/bsp/easepi/common/easepi-eth-order.sh" \
		"${destination}/usr/local/sbin/easepi-eth-order.sh"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/common/easepi-eth-order.service" \
		"${destination}/etc/systemd/system/easepi-eth-order.service"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/easepi-r2/eth_order" \
		"${destination}/etc/eth_order"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/easepi-r2/71-rndis-net.rules" \
		"${destination}/etc/udev/rules.d/71-rndis-net.rules"
}

function post_family_tweaks_bsp__easepi_r2_common_peripherals() {
	display_alert "EasePi-R2" "Installing common EasePi peripheral files from BSP" "info"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/common/easepi_remote" \
		"${destination}/etc/rc_keymaps/easepi_remote"

	install -D -m 0755 "${SRC}/packages/bsp/easepi/common/easepi-fix-infrared.sh" \
		"${destination}/usr/local/ir/fix_infrared.sh"

	install -D -m 0755 "${SRC}/packages/bsp/easepi/common/ir-setup.sh" \
		"${destination}/usr/local/ir/ir-setup.sh"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/common/ir-keymap.service" \
		"${destination}/etc/systemd/system/ir-keymap.service"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/common/infrared.conf" \
		"${destination}/etc/modules-load.d/infrared.conf"
}

function post_customize_image__enable_easepi_r2_services() {
	display_alert "EasePi-R2" "Enabling R2 peripheral services" "info"

	chroot_sdcard systemctl enable easepi-eth-order.service

	chroot_sdcard systemctl enable ir-keymap.service

	if [[ "${BRANCH}" == "vendor" ]]; then
		display_alert "EasePi-R2" "Enabling bluetooth-hciattach.service (vendor kernel)" "info"
		chroot_sdcard systemctl enable bluetooth-hciattach.service
	else
		display_alert "EasePi-R2" "Mainline kernel serdev handles BT" "info"
	fi
	chroot_sdcard systemctl enable bluetooth.service
}