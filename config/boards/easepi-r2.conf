# Rockchip RK3588 octa core 8-32GB SoC 4x2.5GBe eMMC USB3 NVMe SATA
BOARD_NAME="EasePi-R2"
BOARD_VENDOR="LinkEase"
BOARDFAMILY="rockchip-rk3588"
BOARD_MAINTAINER="ifroncy01"
INTRODUCED="2026"
BOOTCONFIG="easepi-r2-rk3588_defconfig"
KERNEL_TARGET="current,edge,vendor"
KERNEL_TEST_TARGET="current,vendor"
FULL_DESKTOP="yes"
BOOT_LOGO="desktop"
BOOT_FDT_FILE="rockchip/rk3588-easepi-r2.dtb"
BOOT_SCENARIO="spl-blobs"
BOOTFS_TYPE=fat
BOOTSIZE=256
IMAGE_PARTITION_TABLE="gpt"
PACKAGE_LIST_BOARD="i2c-tools rfkill bluetooth bluez bluez-tools ir-keytable"

# ==================== uboot config ====================
function post_family_config__easepi_r2_use_mainline_uboot_except_vendor() {
	if [[ "${BRANCH}" == "vendor" ]]; then
		display_alert "$BOARD" "Vendor: using vendor U-Boot + kernel, enabling hciattach BT" "info"
		return 0
	fi

	display_alert "$BOARD" "Mainline (${BRANCH}): using mainline U-Boot + kernel serdev BT" "info"
	declare -g BOOTSOURCE="https://github.com/u-boot/u-boot"
	declare -g BOOTBRANCH="tag:v2025.10"
	declare -g BOOTPATCHDIR="v2025.10"
	declare -g BOOTDIR="u-boot-${BOARD}"
	declare -g UBOOT_TARGET_MAP="BL31=${RKBIN_DIR}/${BL31_BLOB} ROCKCHIP_TPL=${RKBIN_DIR}/${DDR_BLOB};;u-boot-rockchip.bin"
	unset uboot_custom_postprocess write_uboot_platform write_uboot_platform_mtd

	function write_uboot_platform() {
		dd "if=$1/u-boot-rockchip.bin" "of=$2" bs=32k seek=1 conv=notrunc status=none
	}
}

# ==================== IR Module ====================
function post_family_tweaks_bsp__easepi_r2_install_ir_files() {
	display_alert "EasePi-R2" "Installing IR files from BSP" "info"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/ir_remote" \
		"${destination}/etc/rc_keymaps/ir_remote"
	install -D -m 0755 "${SRC}/packages/bsp/easepi/ir.sh" \
		"${destination}/usr/local/ir/ir.sh"
	install -D -m 0644 "${SRC}/packages/bsp/easepi/ir.service" \
		"${destination}/etc/systemd/system/ir.service"

	mkdir -p "${destination}"/etc/modules-load.d
	cat <<- EOF > "${destination}/etc/modules-load.d/ir.conf"
	gpio_ir_recv
	ir_nec_decoder
	EOF
}

function post_customize_image__enable_easepi_r2_ir_service() {
	chroot_sdcard systemctl enable ir.service
}

# ==================== Bluetooth Module ====================
function post_family_tweaks_bsp__easepi_r2_install_bt_files() {
	display_alert "EasePi-R2" "Installing Bluetooth files from BSP" "info"

	install -D -m 0755 "${SRC}/packages/bsp/easepi/bt-hciattach.sh" \
		"${destination}/usr/local/sbin/bt-hciattach.sh"
	install -D -m 0644 "${SRC}/packages/bsp/easepi/bt-hciattach.service" \
		"${destination}/lib/systemd/system/bt-hciattach.service"

	mkdir -p ${destination}/etc/default/
	cat <<- EOF > "${destination}/etc/default/easepi-bt"
	# EasePi-R2 Bluetooth device configuration
	BOARD_NAME="EasePi-R2"
	BT_UART_DEVICE="/dev/ttyS9"
	BT_BAUD_RATE="1500000"
	BT_CHIP_TYPE="bcm43xx"
	EOF
}

function pre_customize_image__copy_easepi_r2_bt_firmware() {
	display_alert "EasePi-R2" "Setting up Bluetooth firmware symlinks" "info"

	if [ -f "${SDCARD}"/lib/firmware/brcm/BCM4345C0.hcd ]; then
		ln -sf BCM4345C0.hcd "${SDCARD}"/lib/firmware/brcm/BCM4345C0.easepi,r2.hcd || true
	fi

	if [ -f "${SDCARD}"/lib/firmware/brcm/brcmfmac43455-sdio.bin ]; then
		ln -sf brcmfmac43455-sdio.bin "${SDCARD}"/lib/firmware/brcm/brcmfmac43455-sdio.easepi,r2.bin || true
	fi

	if [ -f "${SDCARD}"/lib/firmware/brcm/brcmfmac43455-sdio.txt ]; then
		ln -sf brcmfmac43455-sdio.txt "${SDCARD}"/lib/firmware/brcm/brcmfmac43455-sdio.easepi,r2.txt || true
	fi

	if [ -f "${SDCARD}"/lib/firmware/brcm/brcmfmac43455-sdio.clm_blob ]; then
		ln -sf brcmfmac43455-sdio.clm_blob "${SDCARD}"/lib/firmware/brcm/brcmfmac43455-sdio.easepi,r2.clm_blob || true
	fi
}

function post_customize_image__enable_easepi_r2_bt_services() {
	if [[ "${BRANCH}" == "vendor" ]]; then
		display_alert "EasePi-R2" "Enabling bt-hciattach.service (vendor kernel)" "info"
		chroot_sdcard systemctl enable bt-hciattach.service
	else
		display_alert "EasePi-R2" "Mainline kernel serdev handles BT" "info"
	fi
	chroot_sdcard systemctl enable bluetooth.service
}

# ==================== Ethernet Module ====================
function post_family_tweaks_bsp__easepi_r2_install_eth_files() {
	display_alert "EasePi-R2" "Installing Ethernet order files from BSP" "info"

	install -D -m 0755 "${SRC}/packages/bsp/easepi/eth-order.sh" \
		"${destination}/usr/local/sbin/eth-order.sh"
	install -D -m 0644 "${SRC}/packages/bsp/easepi/eth-order.service" \
		"${destination}/etc/systemd/system/eth-order.service"
	install -D -m 0644 "${SRC}/packages/bsp/easepi/easepi-r2/eth_order" \
		"${destination}/etc/eth_order"
	install -D -m 0644 "${SRC}/packages/bsp/easepi/easepi-r2/71-net.rules" \
		"${destination}/etc/udev/rules.d/71-net.rules"

	# Install ip-wrapper for sorted interface display
	display_alert "EasePi-R2" "Installing ip-wrapper for sorted interface display" "info"
	# Install ip-easy wrapper script
	install -D -m 0755 /dev/null "${destination}/usr/local/bin/ip-easy"
	cat <<- 'EOF' > "${destination}/usr/local/bin/ip-easy"
	#!/bin/bash
	if [[ "$#" -eq 1 && ( "$1" == "addr" || "$1" == "link" ) ]]; then
		interfaces=$(ip -o link show | awk -F': ' '{print $2}' | sort)
		for iface in $interfaces; do ip "$@" show dev "$iface"; done
	else
		/sbin/ip "$@"
	fi
	EOF
	# Install profile.d alias
	install -D -m 0644 /dev/null "${destination}/etc/profile.d/ip-sorted.sh"
	cat <<- 'EOF' > "${destination}/etc/profile.d/ip-sorted.sh"
	alias ip="ip-easy"
	EOF
}

function post_customize_image__enable_easepi_r2_eth_service() {
	chroot_sdcard systemctl enable eth-order.service
}

# ==================== Jellyfin-FFmpeg Module ====================
function custom_apt_repo__add_jellyfin-ffmpeg-repo() {
	[[ "${CUSTOM_REPO_WHEN}" = "image-early" && "${BRANCH}" == "vendor" && "${RELEASE}" =~ ^(bookworm|trixie|jammy|noble)$ ]] || return 0
	display_alert "Preparing jellyfin ffmpeg repository..." "EasePi-R2" "info"

	local keyring_url repo_url
	if [[ "${DISTRIBUTION}" == "Ubuntu" ]]; then
		keyring_url="https://repo.jellyfin.org/ubuntu/jellyfin_team.gpg.key"
		repo_url="https://repo.jellyfin.org/ubuntu"
	else
		keyring_url="https://repo.jellyfin.org/jellyfin_team.gpg.key"
		repo_url="https://repo.jellyfin.org/debian"
	fi
	curl -fsSL "$keyring_url" -o "${SDCARD}"/tmp/jellyfin.gpg.key || return 1
	gpg --yes --dearmor -o "${SDCARD}"/etc/apt/keyrings/jellyfin.gpg "${SDCARD}"/tmp/jellyfin.gpg.key || return 1
	rm -f "${SDCARD}"/tmp/jellyfin.gpg.key
	echo "deb [arch=${ARCH} signed-by=/etc/apt/keyrings/jellyfin.gpg] $repo_url ${RELEASE} main" > "${SDCARD}"/etc/apt/sources.list.d/jellyfin.list
}

function extension_prepare_config__prepare_jellyfin-ffmpeg_config() {
	[[ "${BRANCH}" == "vendor" && "${RELEASE}" =~ ^(bookworm|trixie|jammy|noble)$ ]] || return 0
	display_alert "Preparing jellyfin ffmpeg packages..." "EasePi-R2" "info"

	local FFMPEG_PACKAGE=jellyfin-ffmpeg7

	add_packages_to_image ${FFMPEG_PACKAGE}
}

function pre_customize_image__jellyfin_ffmpeg_link() {
	[[ "${BRANCH}" == "vendor" && "${RELEASE}" =~ ^(bookworm|trixie|jammy|noble)$ ]] || return 0
	display_alert "Create link to jellyfin-ffmpeg binaries..." "EasePi-R2" "info"

	local p
	for p in ffmpeg ffprobe; do
		ln -s /usr/lib/jellyfin-ffmpeg/$p "${SDCARD}"/usr/local/bin/$p
	done

	return 0
}
