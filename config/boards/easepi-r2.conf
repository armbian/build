# Rockchip RK3588 octa core 8-32GB SoC 4x2.5GBe eMMC USB3 NVMe SATA
BOARD_NAME="EasePi-R2"
BOARD_VENDOR="EasePi"
BOARDFAMILY="rockchip-rk3588"
BOARD_MAINTAINER="Ifroncy"
INTRODUCED="2026"
BOOTCONFIG="easepi-r2-rk3588_defconfig"
KERNEL_TARGET="current,edge,bleedingedge,vendor"
KERNEL_TEST_TARGET="current,vendor"
FULL_DESKTOP="yes"
BOOT_LOGO="desktop"
BOOT_FDT_FILE="rockchip/rk3588-easepi-r2.dtb"
BOOT_SCENARIO="spl-blobs"
BOOTFS_TYPE=fat
BOOTSIZE=256
IMAGE_PARTITION_TABLE="gpt"
#OVERLAY_DISABLE_AUTOPATCH="yes"
BOOT_SCRIPT="boot-rk35xx.cmd"
BOOT_ENV_FILE="armbianEnv.txt"

# Bluetooth HCI attach configuration for AP6255 module (ttyS9)
declare -g BLUETOOTH_HCIATTACH_PARAMS="-s 115200 /dev/ttyS9 bcm43xx 1500000"
declare -g BLUETOOTH_HCIATTACH_RKFILL_NUM="all"

# Additional packages are now handled by easepi-r2-peripherals extension via add_packages_to_image
# Bluetooth: rfkill bluetooth bluez bluez-tools  |  IR: i2c-tools ir-keytable
PACKAGE_LIST_EXTRA="${PACKAGE_LIST_EXTRA} fonts-dejavu-core"

function post_family_config__easepi-r2_use_mainline_uboot_except_vendor() {
	# use vendor uboot for _vendor_ branch
	if [[ "${BRANCH}" == "vendor" ]]; then
		display_alert "$BOARD" "Vendor U-Boot overrides for $BOARD - $BRANCH" "info"
		return 0
	fi

	# use mainline uboot for non-vendor branches (current/edge)
	display_alert "$BOARD" "Mainline U-Boot overrides for $BOARD - $BRANCH" "info"
	declare -g BOOTSOURCE="https://github.com/u-boot/u-boot"
	declare -g BOOTBRANCH="tag:v2025.10"
	declare -g BOOTPATCHDIR="v2025.10"
	declare -g BOOTDIR="u-boot-${BOARD}"
	declare -g UBOOT_TARGET_MAP="BL31=${RKBIN_DIR}/${BL31_BLOB} ROCKCHIP_TPL=${RKBIN_DIR}/${DDR_BLOB};;u-boot-rockchip.bin"
	unset uboot_custom_postprocess write_uboot_platform write_uboot_platform_mtd

	function write_uboot_platform() {
		dd "if=$1/u-boot-rockchip.bin" "of=$2" bs=32k seek=1 conv=notrunc status=none
	}
}

# EasePi R2 Peripherals Extension (IR + Bluetooth)
# Note: This extension is for EasePi-R2 (RK3588) only
# EasePi-R2 hardware features:
#   - IR receiver
#   - AP6255 Bluetooth module (ttyS9)
#   - No OLED display
#
# This extension integrates bluetooth-hciattach; no separate extension needed

function extension_prepare_config__easepi-r2-peripherals() {
	display_alert "Extension: EasePi R2 Peripherals" "Preparing IR + Bluetooth support" "info"

	if [[ -z "${BLUETOOTH_HCIATTACH_PARAMS}" ]]; then
		exit_with_error "EasePi-R2 Peripherals: BLUETOOTH_HCIATTACH_PARAMS is not set - please set in the board file."
	fi
	if [[ -z "${BLUETOOTH_HCIATTACH_RKFILL_NUM}" ]]; then
		declare -g BLUETOOTH_HCIATTACH_RKFILL_NUM=0
	fi
}

function post_family_config__easepi_r2_add_bluetooth_packages() {
	display_alert "EasePi-R2" "Adding bluetooth packages to image" "info"
	add_packages_to_image rfkill bluetooth bluez bluez-tools
}

function post_family_config__easepi_r2_add_ir_packages() {
	display_alert "EasePi-R2" "Adding IR packages to image" "info"
	add_packages_to_image i2c-tools ir-keytable
}

function post_family_tweaks_bsp__easepi_r2_bluetooth_hciattach_service() {
	if [[ "${BRANCH}" != "vendor" ]]; then
		display_alert "EasePi-R2" "Non-vendor branch: skipping hciattach BT" "info"
		return 0
	fi

	display_alert "EasePi-R2" "Vendor: adding bluetooth hciattach service to BSP" "info"
	: "${destination:?destination is not set}"

	declare script_dir="/usr/local/sbin"
	declare systemd_dir="/lib/systemd/system"
	run_host_command_logged mkdir -pv "${destination}${script_dir}"
	run_host_command_logged mkdir -pv "${destination}${systemd_dir}"
	declare script_path="${script_dir}/bluetooth-hciattach.sh"

	cat <<- BT_HCIATTACH_SCRIPT > "${destination}${script_path}"
		#!/bin/bash
		rfkill unblock ${BLUETOOTH_HCIATTACH_RKFILL_NUM}
		if hciconfig hci0 up 2>/dev/null; then
			echo "Bluetooth hci0 already initialized by kernel driver"
			exit 0
		fi
		sleep 1
		hciattach -n ${BLUETOOTH_HCIATTACH_PARAMS}
	BT_HCIATTACH_SCRIPT
	run_host_command_logged chmod -v +x "${destination}${script_path}"

	cat <<- BT_HCIATTACH_SYSTEMD_SERVICE > "$destination"/lib/systemd/system/bluetooth-hciattach.service
		[Unit]
		Description=${BOARD} Bluetooth HCIAttach fix
		After=network.target
		StartLimitIntervalSec=0
		[Service]
		Type=simple
		ExecStart=${script_path}

		[Install]
		WantedBy=multi-user.target
	BT_HCIATTACH_SYSTEMD_SERVICE

	return 0
}

function pre_customize_image__copy_easepi_r2_files() {
	display_alert "EasePi-R2" "Writing R2 peripheral files" "info"

	mkdir -p "${SDCARD}"/usr/local/ir
	mkdir -p "${SDCARD}"/usr/local/sbin
	mkdir -p "${SDCARD}"/etc/systemd/system
	mkdir -p "${SDCARD}"/etc/modules-load.d
	mkdir -p "${SDCARD}"/etc/rc_keymaps

	# =============================================
	# IR Keymap Service (systemd unit) — R2 specific
	# =============================================
	cat <<-'EOF' > "${SDCARD}"/etc/systemd/system/ir-keymap.service
		[Unit]
		Description=Apply IR keymap configuration
		After=sysinit.target
		ConditionPathExists=/dev/lirc0

		[Service]
		Type=oneshot
		ExecStart=/bin/bash -c "/usr/bin/ir-keytable -c -w /etc/rc_keymaps/easepi_remote && /usr/bin/ir-keytable -p nec"
		# Auto-restart on failure
		Restart=on-failure
		# Restart interval 3 seconds
		RestartSec=3

		[Install]
		WantedBy=multi-user.target
	EOF

	# =============================================
	# IR Keymap service (R2 uses inline exec, no separate setup script)
	# =============================================

	# =============================================
	# Infrared module config — R2 specific (includes lirc_dev, lirc_i2c)
	# =============================================
	cat <<-'EOF' > "${SDCARD}"/etc/modules-load.d/infrared.conf
		gpio_ir_recv
		ir_nec_decoder
		lirc_dev
		lirc_i2c
	EOF

	# =============================================
	# IR Remote Keymap
	# =============================================
	cat <<-'EOF' > "${SDCARD}"/etc/rc_keymaps/easepi_remote
		# table easepi_remote, type: nec
		0x22dc KEY_POWER
		0x2282 KEY_MENU
		0x22ca KEY_UP
		0x22d2 KEY_DOWN
		0x2299 KEY_LEFT
		0x22c1 KEY_RIGHT
		0x22ce KEY_ENTER
		0x2295 KEY_BACK
		0x2288 KEY_HOME
		0x2280 KEY_VOLUMEUP
		0x2281 KEY_VOLUMEDOWN
		0x2287 KEY_0
		0x2292 KEY_1
		0x2293 KEY_2
		0x22cc KEY_3
		0x228e KEY_4
		0x228f KEY_5
		0x22c8 KEY_6
		0x228a KEY_7
		0x228b KEY_8
		0x22c4 KEY_9
		0x228d KEY_SETUP
		0x2285 KEY_PAGEUP
		0x2286 KEY_PAGEDOWN
	EOF

	# =============================================
	# IR Diagnostic Tool (fix_infrared.sh)
	# =============================================
	cat <<-'FIXIRSCRIPT' > "${SDCARD}"/usr/local/ir/fix_infrared.sh
		#!/bin/bash
		# EasePi IR diagnostic and configuration tool
		# Manual diagnosis and reconfiguration of IR receiver
		# Usage: sudo bash /usr/local/ir/fix_infrared.sh

		RED='\033[0;31m'
		GREEN='\033[0;32m'
		YELLOW='\033[1;33m'
		NC='\033[0m'

		SCRIPT_DIR="/usr/local/ir"
		SERVICE_FILE="/etc/systemd/system/ir-keymap.service"
		LOG_DIR="/var/log/ir"
		LOG_FILE="${LOG_DIR}/ir.log"

		mkdir -p "${LOG_DIR}"
		touch "${LOG_FILE}"
		chmod 644 "${LOG_FILE}"

		log_info() {
		    echo -e "${GREEN}[INFO]${NC} $1"
		    echo "$(date +'%Y-%m-%d %H:%M:%S') - INFO - $1" >> ${LOG_FILE} 2>&1
		}

		log_warn() {
		    echo -e "${YELLOW}[WARN]${NC} $1"
		    echo "$(date +'%Y-%m-%d %H:%M:%S') - WARN - $1" >> ${LOG_FILE} 2>&1
		}

		log_error() {
		    echo -e "${RED}[ERROR]${NC} $1"
		    echo "$(date +'%Y-%m-%d %H:%M:%S') - ERROR - $1" >> ${LOG_FILE} 2>&1
		}

		check_root() {
		    if [ "$EUID" -ne 0 ]; then
		        log_error "Please run this script with root privileges (sudo bash ${SCRIPT_DIR}/fix_infrared.sh)"
		        exit 1
		    fi
		}

		check_files() {
		    log_info "Checking IR related files..."
		    if [ ! -f "${SERVICE_FILE}" ]; then
		        log_error "Service file missing: ${SERVICE_FILE}"
		        exit 1
		    fi
		    if [ ! -f "/etc/modules-load.d/infrared.conf" ]; then
		        log_error "Module config file missing: /etc/modules-load.d/infrared.conf"
		        exit 1
		    fi
		    if [ ! -f "/etc/rc_keymaps/easepi_remote" ]; then
		        log_error "Keymap file missing: /etc/rc_keymaps/easepi_remote"
		        exit 1
		    fi
		    log_info "? File check passed"
		}

		check_deps() {
		    log_info "Checking system dependencies..."
		    if ! command -v ir-keytable &> /dev/null; then
		        log_warn "ir-keytable not installed"
		        log_info "Installing..."
		        apt-get update -y >> ${LOG_FILE} 2>&1
		        apt-get install -y --no-install-recommends ir-keytable >> ${LOG_FILE} 2>&1
		        if [ $? -eq 0 ]; then
		            log_info "? ir-keytable installed successfully"
		        else
		            log_error "? Installation failed"
		            exit 1
		        fi
		    else
		        log_info "? ir-keytable already installed"
		    fi
		}

		check_modules() {
		    log_info "Checking kernel modules..."
		    modules=("gpio_ir_recv" "ir_nec_decoder")
		    for mod in "${modules[@]}"; do
		        if lsmod | grep -q "^${mod} "; then
		            log_info "? ${mod} loaded"
		        else
		            log_warn "? ${mod} not loaded"
		            log_info "Loading module..."
		            modprobe ${mod} >> ${LOG_FILE} 2>&1
		            if [ $? -eq 0 ]; then
		                log_info "? ${mod} loaded successfully"
		            else
		                log_error "? ${mod} failed to load"
		            fi
		        fi
		    done
		}

		check_device() {
		    log_info "Checking IR device..."
		    if [ -c "/dev/lirc0" ]; then
		        log_info "? /dev/lirc0 device node exists"
		    else
		        log_error "? /dev/lirc0 device node not found"
		        log_warn "Please check hardware connection or device tree configuration"
		    fi
		}

		check_protocol() {
		    log_info "Checking IR protocol..."
		    PROTOCOLS=$(ir-keytable 2>&1 | grep "Enabled kernel protocols" || true)
		    if [ -n "$PROTOCOLS" ]; then
		        log_info "Current protocol: $PROTOCOLS"
		    fi
		    if echo "$PROTOCOLS" | grep -q "nec"; then
		        log_info "? NEC protocol enabled"
		    else
		        log_warn "? NEC protocol not enabled"
		        log_info "Enabling NEC protocol..."
		        ir-keytable -p nec >> ${LOG_FILE} 2>&1
		        if [ $? -eq 0 ]; then
		            log_info "? NEC protocol enabled successfully"
		        else
		            log_error "? NEC protocol enable failed"
		        fi
		    fi
		}

		check_keymap() {
		    log_info "Checking keymap..."
		    if ir-keytable -c -w /etc/rc_keymaps/easepi_remote >> ${LOG_FILE} 2>&1; then
		        log_info "? Keymap applied successfully"
		    else
		        log_warn "? Keymap application failed"
		    fi
		}

		check_service() {
		    log_info "Checking IR service status..."
		    if systemctl is-active --quiet ir-keymap.service; then
		        log_info "? ir-keymap.service is active"
		    else
		        log_warn "? ir-keymap.service is inactive"
		        log_info "Starting service..."
		        systemctl start ir-keymap.service
		        if [ $? -eq 0 ]; then
		            log_info "? Service started successfully"
		        else
		            log_warn "? Service start failed"
		        fi
		    fi
		    if systemctl is-enabled --quiet ir-keymap.service; then
		        log_info "? Service enabled for auto-start"
		    else
		        log_warn "? Service not enabled for auto-start"
		        log_info "Enabling auto-start..."
		        systemctl enable ir-keymap.service
		    fi
		}

		show_commands() {
		    echo -e "\n${GREEN}=== IR Diagnostic and Configuration Tool ===${NC}"
		    echo -e "\n${YELLOW}? Common management commands:${NC}"
		    echo -e "  • View service status:  systemctl status ir-keymap.service"
		    echo -e "  • Restart service:    systemctl restart ir-keymap.service"
		    echo -e "  • Stop service:       systemctl stop ir-keymap.service"
		    echo -e "  • View logs:          tail -f /var/log/ir/ir.log"
		    echo -e "  • Test IR signals:    ir-keytable -t"
		    echo -e "  • View protocol cfg:  ir-keytable"
		    echo -e "\n${YELLOW}? Tool features:${NC}"
		    echo -e "  • Check file integrity"
		    echo -e "  • Check and install dependencies"
		    echo -e "  • Check kernel modules"
		    echo -e "  • Check device nodes"
		    echo -e "  • Check and configure protocol"
		    echo -e "  • Check service status"
		    echo -e ""
		}

		main() {
		    clear
		    show_commands
		    echo -e "${GREEN}Starting diagnostics...${NC}\n"

		    check_root
		    check_files
		    check_deps
		    check_modules
		    check_device
		    check_protocol
		    check_keymap
		    check_service

		    echo -e "\n${GREEN}=== Diagnostics Complete ===${NC}"
		    echo -e "${YELLOW}Test IR signal reception? (y/n)${NC}"
		    echo -e "${YELLOW}(Press Ctrl+C to exit test)${NC}"
		    read -r response
		    if [[ "$response" =~ ^([yY][eE][sS]|[yY])$ ]]; then
		        echo -e "${GREEN}Press a remote control button...${NC}"
		        ir-keytable -t
		    fi
		}

		main
	FIXIRSCRIPT

	# =============================================
	# Set script permissions
	# =============================================
	if [ -f "${SDCARD}"/usr/local/ir/fix_infrared.sh ]; then
		chmod +x "${SDCARD}"/usr/local/ir/fix_infrared.sh
	fi
}

function post_customize_image__enable_easepi_r2_services() {
	display_alert "EasePi-R2" "Enabling R2 peripheral services" "info"

	# Enable IR service
	chroot_sdcard systemctl enable ir-keymap.service

	# Enable Bluetooth service
	if [[ "${BRANCH}" == "vendor" ]]; then
		display_alert "EasePi-R2" "Enabling bluetooth-hciattach.service (vendor kernel)" "info"
		chroot_sdcard systemctl enable bluetooth-hciattach.service
	else
		display_alert "EasePi-R2" "Skipping bluetooth-hciattach.service (mainline kernel serdev handles BT)" "info"
	fi
	chroot_sdcard systemctl enable bluetooth.service
}
