# Seeed Studio Rockchip RK3588 octa core 4/8/16GB RAM eMMC NVMe 2.5GbE USB3 HDMI DP WiFi BT
BOARD_NAME="reComputer-RK3588-Devkit"
BOARDFAMILY="seeed-rk3588"
BOARD_MAINTAINER="Pillar1989"
BOARD_VENDOR="seeed-studio"
INTRODUCED="2025"
BOOTCONFIG="recomputer-rk3588-devkit_defconfig" # vendor name, not standard, see hook below, set BOOT_SOC below to compensate
BOOT_SOC="rk3588"
KERNEL_TARGET="vendor"
KERNEL_TEST_TARGET="vendor"
FULL_DESKTOP="yes"
BOOT_LOGO="desktop"
BOOT_FDT_FILE="rockchip/rk3588-recomputer-rk3588-devkit.dtb"
BOOT_SCENARIO="spl-blobs"
BOOT_SUPPORT_SPI="yes"
BOOT_SPI_RKSPI_LOADER="yes"
IMAGE_PARTITION_TABLE="gpt"
OTA_ENABLE="yes"
SERIALCON="ttyFIQ0,ttyGS0"
BT_UART="/dev/ttyS6"
PACKAGE_LIST_BOARD="net-tools rfkill pulseaudio-module-bluetooth fail2ban"
AIC8800_TYPE="sdio"
enable_extension "radxa-aic8800"

source "${SRC}/config/sources/vendors/seeed-studio/recomputer-rk35xx-common.inc"

function post_family_config__recomputer_rk3588_devkit_use_seeed_bootscript() {
	display_alert "$BOARD" "Using Seeed bootscript: boot-seeed-rk35xx.cmd -> boot.cmd" "info"
	declare -g BOOTSCRIPT="boot-seeed-rk35xx.cmd:boot.cmd"
}

# Install libmali package for RK3588 GPU userspace
function pre_install_distribution_specific__recomputer_rk3588_install_libmali() {
	display_alert "Installing Mali GPU libraries from APT repo" "libmali-g610" "info"

	seeed_recomputer_install_from_apt libmali-valhall-g610-g24p0-x11-wayland-gbm
	chroot_sdcard ldconfig
}

# DMA heap — Mali GBM requires /dev/dma_heap access.
function post_family_tweaks__recomputer_rk3588_dma_heap_permissions() {
	display_alert "$BOARD" "Setting DMA heap permissions for Mali GPU" "info"

	mkdir -p "${SDCARD}/etc/udev/rules.d/"
	echo 'SUBSYSTEM=="dma_heap", GROUP="render", MODE="0660"' > "${SDCARD}/etc/udev/rules.d/50-mali-dma-heap.rules"

	# GDM greeter needs render+video groups for DRM and DMA heap access.
	chroot_sdcard usermod -aG render Debian-gdm 2>/dev/null || true
	chroot_sdcard usermod -aG video Debian-gdm 2>/dev/null || true
}

# X11 — OutputClass matches rockchip DRM
function post_family_tweaks__recomputer_rk3588_x11_kms_config() {
	display_alert "$BOARD" "Configuring X11 for Rockchip KMS" "info"

	mkdir -p "${SDCARD}"/etc/X11/xorg.conf.d/
	cat > "${SDCARD}"/etc/X11/xorg.conf.d/10-rockchip-kms.conf <<-'EOF'
Section "OutputClass"
    Identifier  "RockchipDRM"
    MatchDriver "rockchip"
    Driver      "modesetting"
    Option      "PrimaryGPU"     "yes"
EndSection
EOF
}

# Mali EGL — bypass libglvnd for EGL/GLES so GLVND does not fall back to Mesa/llvmpipe.
# Keep Mali GBM selected to match the Mali userspace stack used by GNOME Wayland.
function post_family_tweaks__recomputer_rk3588_mali_egl_override() {
	display_alert "$BOARD" "Replacing libglvnd EGL/GLES with Mali" "info"
	local LIB_DIR="${SDCARD}/usr/lib/aarch64-linux-gnu"

	# Remove libglvnd ELF files — ldconfig restores soname symlinks from their SONAME.
	for f in libEGL.so.1.1.0 libGLESv2.so.2.1.0; do
		rm -f "${LIB_DIR}/${f}"
	done

	# Replace soname symlinks with direct Mali links
	for f in libEGL.so.1 libGLESv2.so.2; do
		rm -f "${LIB_DIR}/${f}"
		ln -sf libmali.so.1 "${LIB_DIR}/${f}"
	done

	# Mali EGL vendor JSON for libglvnd-aware apps
	mkdir -p "${SDCARD}"/usr/share/glvnd/egl_vendor.d/
	cat > "${SDCARD}"/usr/share/glvnd/egl_vendor.d/00_mali.json <<-'EOF'
{
    "file_format_version" : "1.0.0",
    "ICD" : {
        "library_path" : "libmali.so.1"
    }
}
EOF
}

# Fix Mali GBM symlink after all apt ops (dpkg-divert protects against future ldconfig).
function pre_umount_final_image__recomputer_rk3588_mali_gbm_fixup() {
	display_alert "$BOARD" "Restoring Mali GBM symlink" "info"
	local LIB_DIR="${SDCARD}/usr/lib/aarch64-linux-gnu"

	chroot_sdcard dpkg-divert --rename \
		--divert /usr/lib/aarch64-linux-gnu/libgbm.so.1.0.0.mesa \
		/usr/lib/aarch64-linux-gnu/libgbm.so.1.0.0 2>/dev/null || true

	rm -f "${LIB_DIR}/libgbm.so.1"
	ln -sf mali/libgbm.so.1 "${LIB_DIR}/libgbm.so.1" 
}

# Install RK camera engine package for RK3588
function pre_install_distribution_specific__recomputer_rk3588_install_camera_engine() {
	display_alert "Installing camera engine from APT repo" "camera-engine-rkaiq" "info"

	seeed_recomputer_install_from_apt camera-engine-rkaiq-rk3588

	display_alert "Camera engine installed successfully" "camera-engine-rkaiq" "info"
}

# Audio naming: HDMI0, HDMI1, HDMI-In, DP0, ES8311
function post_family_tweaks__recomputer_rk3588_naming_audios() {
	display_alert "$BOARD" "Renaming recomputer rk3588 devkit audios" "info"

	mkdir -p "${SDCARD}"/etc/udev/rules.d/
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-hdmi0-sound", ENV{SOUND_DESCRIPTION}="HDMI0 Audio"' > "${SDCARD}"/etc/udev/rules.d/90-naming-audios.rules
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-hdmi1-sound", ENV{SOUND_DESCRIPTION}="HDMI1 Audio"' >> "${SDCARD}"/etc/udev/rules.d/90-naming-audios.rules
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-hdmiin-sound", ENV{SOUND_DESCRIPTION}="HDMI-In Audio"' >> "${SDCARD}"/etc/udev/rules.d/90-naming-audios.rules
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-dp0-sound", ENV{SOUND_DESCRIPTION}="DP0 Audio"' >> "${SDCARD}"/etc/udev/rules.d/90-naming-audios.rules
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-es8311-sound", ENV{SOUND_DESCRIPTION}="ES8311 Audio"' >> "${SDCARD}"/etc/udev/rules.d/90-naming-audios.rules
}

# Remove armbian-hardware-optimize (RK3588 variant)
function post_family_tweaks__recomputer_rk3588_disable_armbian_hardware_optimize() {
	display_alert "$BOARD" "Removing armbian-hardware-optimize.service" "info"

	chroot_sdcard systemctl --no-reload disable armbian-hardware-optimize.service 2>/dev/null || true
	rm -f "${SDCARD}"/lib/systemd/system/armbian-hardware-optimize.service
}
