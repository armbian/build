# Rockchip RK3588S SoC octa core 4-16GB SoC 1GbE eMMC USB3 NVMe WiFi/BT
declare -g BOARD_NAME="Mekotronics R58S2"
declare -g BOARD_VENDOR="mekotronics"
declare -g BOARDFAMILY="rockchip-rk3588"
declare -g BOARD_MAINTAINER="HeyMeco"
declare -g INTRODUCED="2025"
declare -g KERNEL_TARGET="vendor"
declare -g FULL_DESKTOP="yes"
declare -g BOOT_LOGO="desktop"
declare -g BOOT_FDT_FILE="rockchip/rk3588s-blueberry-rp01a-v10.dtb"
declare -g DISPLAY_MANAGER="wayland"
declare -g ASOUND_STATE="asound.state.rk3588hd"
declare -g BOOT_SOC="rk3588"
declare -g IMAGE_PARTITION_TABLE="gpt"
declare -g BOOT_SCENARIO="tpl-blob-atf-mainline"

# Audio naming - applies to all branches
function post_family_tweaks__mekotronics_r58s2_naming_audios() {
	display_alert "$BOARD" "Renaming r58s2 audios" "info"

	mkdir -p "${SDCARD}/etc/udev/rules.d/"
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-hdmi0-sound", ENV{SOUND_DESCRIPTION}="HDMI0 Audio"' > "${SDCARD}/etc/udev/rules.d/90-naming-audios.rules"
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-es8316-sound", ENV{SOUND_DESCRIPTION}="ES8316 Audio"' >> "${SDCARD}/etc/udev/rules.d/90-naming-audios.rules"

	return 0
}


# WiFi via bcmdhd driver
enable_extension "bcmdhd"
BCMDHD_TYPE="sdio"

# Bluetooth via hciattach
declare -g BLUETOOTH_HCIATTACH_PARAMS="-s 115200 /dev/ttyS9 bcm43xx 115200 noflow nosleep"
enable_extension "bluetooth-hciattach"

# DKMS bcmdhd-sdio replaces the in-kernel bcmdhd (PCIe) via depmod ordering;
# set firmware paths for the AP6256 wifi chip on this board.
function post_family_tweaks_bsp__mekotronics_r58s2_bcmdhd_sdio_firmware() {
	display_alert "$BOARD" "Configuring bcmdhd SDIO firmware paths for AP6256" "info"
	mkdir -p "${destination}/etc/modprobe.d/"
	cat > "${destination}/etc/modprobe.d/bcmdhd-r58s2.conf" <<- 'EOF'
		options bcmdhd firmware_path=/lib/firmware/fw_bcm43455c0_ag.bin
		options bcmdhd nvram_path=/lib/firmware/nvram_ap6256.txt
	EOF
}


# Mainline u-boot for all branches
function post_family_config__meko_r58s2_use_mainline_uboot() {
	display_alert "$BOARD" "mainline u-boot overrides for $BOARD / $BRANCH" "info"

	declare -g BOOTCONFIG="mekotronics-r58s2-rk3588s_defconfig"
	declare -g BOOTDELAY=1
	declare -g BOOTSOURCE="https://github.com/u-boot/u-boot.git"
	declare -g BOOTBRANCH="tag:v2026.04-rc2"
	declare -g BOOTPATCHDIR="v2026.04"
	declare -g BOOTDIR="u-boot-${BOARD}"

	declare -g UBOOT_TARGET_MAP="BL31=bl31.elf ROCKCHIP_TPL=${RKBIN_DIR}/${DDR_BLOB};;u-boot-rockchip.bin"
	unset uboot_custom_postprocess write_uboot_platform write_uboot_platform_mtd

	function write_uboot_platform() {
		dd "if=$1/u-boot-rockchip.bin" "of=$2" bs=32k seek=1 conv=notrunc status=none
	}

}

function pre_config_uboot_target__meko_r58s2_patch_rockchip_common_boot_order() {
	declare -a rockchip_uboot_targets=("nvme" "mmc0" "usb" "pxe" "dhcp")
	display_alert "u-boot for ${BOARD}/${BRANCH}" "u-boot: adjust boot order to '${rockchip_uboot_targets[*]}'" "info"
	sed -i -e "s/#define BOOT_TARGETS.*/#define BOOT_TARGETS \"${rockchip_uboot_targets[*]}\"/" include/configs/rockchip-common.h
	regular_git diff -u include/configs/rockchip-common.h || true
}
