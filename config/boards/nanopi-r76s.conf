# Rockchip RK3576 SoC octa core 2-4-16GB RAM SoC 2x 2.5GbE eMMC USB3 WIFI
BOARD_NAME="NanoPi R76S"
BOARD_VENDOR="friendlyelec"
BOARDFAMILY="rk35xx"
BOOTCONFIG="nanopi-r76s-rk3576_defconfig"
KERNEL_TARGET="vendor,edge" # WIP: current kernel
KERNEL_TEST_TARGET="vendor,edge"
FULL_DESKTOP="yes"
BOOT_LOGO="desktop"
BOOT_FDT_FILE="rockchip/rk3576-nanopi-r76s.dtb"
BOOT_SCENARIO="spl-blobs"
IMAGE_PARTITION_TABLE="gpt"
BOARD_MAINTAINER="SuperKali"
INTRODUCED="2025"

function post_family_tweaks__nanopi-r76s_naming_audios() {
	display_alert "$BOARD" "Renaming NanoPi R76S audio" "info"

	mkdir -p $SDCARD/etc/udev/rules.d/
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-hdmi-sound", ENV{SOUND_DESCRIPTION}="HDMI Audio"' > $SDCARD/etc/udev/rules.d/90-naming-audios.rules
	return 0
}

function post_family_config__nanopi_r76s_use_mainline_uboot() {
	display_alert "$BOARD" "Using mainline U-Boot for $BOARD / $BRANCH" "info"

	declare -g BOOTDELAY=1
	declare -g BOOTSOURCE="https://github.com/u-boot/u-boot.git"
	declare -g BOOTBRANCH="tag:v2026.04"
	declare -g BOOTPATCHDIR="v2026.04"
	unset BOOT_FDT_FILE

	# boot_merger (uboot_custom_postprocess) injects the rk3576 SD boost; binman's u-boot-rockchip.bin lacks it
	declare -g UBOOT_TARGET_MAP="BL31=${RKBIN_DIR}/${BL31_BLOB} ROCKCHIP_TPL=${RKBIN_DIR}/${DDR_BLOB};;idbloader.img u-boot.itb"

	unset write_uboot_platform write_uboot_platform_mtd

	function write_uboot_platform() {
		dd "if=$1/idbloader.img" "of=$2" seek=64 conv=notrunc status=none
		dd "if=$1/u-boot.itb" "of=$2" seek=16384 conv=notrunc status=none
	}
}

# Upstream Linux DTS aliases: mmc0 = &sdhci (eMMC), mmc1 = &sdmmc (SD), mmc2 = &sdio
# Boot SD first, then eMMC, then NVMe
function pre_config_uboot_target__nanopi_r76s_patch_rockchip_common_boot_order() {
	declare -a rockchip_uboot_targets=("mmc1" "mmc0" "nvme" "scsi" "usb" "pxe" "dhcp")
	display_alert "u-boot for ${BOARD}/${BRANCH}" "u-boot: adjust boot order to '${rockchip_uboot_targets[*]}'" "info"
	sed -i -e "s/#define BOOT_TARGETS.*/#define BOOT_TARGETS \"${rockchip_uboot_targets[*]}\"/" include/configs/rockchip-common.h
	regular_git diff -u include/configs/rockchip-common.h || true
}
