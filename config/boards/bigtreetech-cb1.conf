# Allwinner H616 quad core 512MB/1GB RAM SoC WiFi
BOARD_NAME="BigTreeTech CB1"
BOARD_VENDOR="bigtreetech"
BOARDFAMILY="sun50iw9"
BOARD_MAINTAINER="JohnTheCoolingFan"
INTRODUCED="2022"
BOOTCONFIG="bigtreetech_cb1_defconfig"
# sun50iw9 (sunxi64) reads BOOTBRANCH/BOOTPATCHDIR directly — it does NOT honor
# BOOTBRANCH_BOARD like the -bpi variant does — so set them here. Point
# BOOTPATCHDIR at this board's own subfolder (as bigtreetech-cb2 does) so only
# the CB1 patches apply, not every board's patches in the v2026.01 dir.
BOOTBRANCH="tag:v2026.01"
BOOTPATCHDIR="v2026.01/board_bigtreetech-cb1"
SERIALCON="ttyS0"
KERNEL_TARGET="current,edge"
KERNEL_TEST_TARGET="current"
FORCE_BOOTSCRIPT_UPDATE="yes"
BOOTFS_TYPE="fat"
BOOT_FS_LABEL="BOOT"
OVERLAY_PREFIX="sun50i-h616"
BOOT_FDT_FILE="sun50i-h616-bigtreetech-cb1-sd.dtb"
