# Rockchip RK3576 SoC octa core 8-64GB SoC 2*GBe eMMC USB3 NvME WIFI
source "${SRC}/config/boards/armsom-sige5.csc"
BOARD_NAME="Banana Pi M5 Pro"
BOARD_VENDOR="sinovoip"
BOARD_MAINTAINER="efectn"
INTRODUCED="2023"

# Default configuration for stable/vendor branches
BOOTCONFIG="bananapi-m5-pro-rk3576_defconfig"
BOOT_FDT_FILE="rockchip/rk3576-bananapi-m5-pro.dtb"

# Those are included in armsom-sige5.csc, but this file is parsed directly
# by the JSON matrix generator and thus those need to be in here
KERNEL_TARGET="edge,vendor"
BOARDFAMILY="rk35xx"

# Fix 0-byte U-Boot DTB compilation panic on edge branch by falling back to Sige5 targets
BOOTCONFIG_edge="armsom-sige5-rk3576_defconfig"
BOOT_FDT_FILE_edge="rockchip/rk3576-armsom-sige5.dtb"
