# Seeed Studio Rockchip RK3576 octa core 8GB RAM eMMC GbE USB3 HDMI WiFi BT
BOARD_NAME="reComputer RK3576 Devkit"
BOARDFAMILY="seeed-rk3576"
BOOT_SOC="rk3576"
BOARD_MAINTAINER="Pillar1989"
BOARD_VENDOR="seeed-studio"
INTRODUCED="2025"
BOOTCONFIG="recomputer-rk3576-devkit_defconfig"
KERNEL_TARGET="vendor"
KERNEL_TEST_TARGET="vendor"
FULL_DESKTOP="yes"
BOOT_LOGO="desktop"
BOOT_FDT_FILE="rockchip/rk3576-recomputer-rk3576-devkit.dtb"
BOOT_SCENARIO="spl-blobs"
BOOT_SUPPORT_SPI="yes"
BOOT_SPI_RKSPI_LOADER="yes"
IMAGE_PARTITION_TABLE="gpt"
OTA_ENABLE="yes"
SERIALCON="ttyFIQ0,ttyGS0"
BT_UART="/dev/ttyS4"
PACKAGE_LIST_BOARD="net-tools rfkill pulseaudio-module-bluetooth fail2ban"
AIC8800_TYPE="sdio"
enable_extension "radxa-aic8800"

source "${SRC}/config/sources/vendors/seeed-studio/recomputer-rk35xx-common.inc"

function post_family_config__recomputer_rk3576_devkit_use_seeed_bootscript() {
	display_alert "$BOARD" "Using Seeed bootscript: boot-seeed-rk35xx.cmd -> boot.cmd" "info"
	declare -g BOOTSCRIPT="boot-seeed-rk35xx.cmd:boot.cmd"
}

# Install Mali-G52 userspace library for GPU hardware acceleration
# Kernel DDK is g25p0; g24p0 userspace library is ABI-compatible
function pre_install_distribution_specific__recomputer_rk3576_install_libmali() {
	display_alert "Installing Mali GPU libraries from APT repo" "libmali-g52" "info"

	seeed_recomputer_install_from_apt libmali-bifrost-g52-g24p0-x11-wayland-gbm
	chroot_sdcard ldconfig
}

# Install camera engine rkaiq for Rockchip ISP
function pre_install_distribution_specific__recomputer_rk3576_install_camera_engine() {
	display_alert "Installing camera engine from APT repo" "camera-engine-rkaiq" "info"

	seeed_recomputer_install_from_apt camera-engine-rkaiq-rk3576
}

# Audio naming: HDMI0, DP0, ES8311
function post_family_tweaks__recomputer_rk3576_naming_audios() {
	display_alert "$BOARD" "Renaming recomputer-rk3576-devkit audios" "info"

	mkdir -p "${SDCARD}/etc/udev/rules.d/"
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-hdmi0-sound", ENV{SOUND_DESCRIPTION}="HDMI0 Audio"' > "${SDCARD}/etc/udev/rules.d/90-naming-audios.rules"
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-dp0-sound", ENV{SOUND_DESCRIPTION}="DP0 Audio"' >> "${SDCARD}/etc/udev/rules.d/90-naming-audios.rules"
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-es8311-sound", ENV{SOUND_DESCRIPTION}="ES8311 Audio"' >> "${SDCARD}/etc/udev/rules.d/90-naming-audios.rules"
}

# DMA heap — Mali GBM requires /dev/dma_heap access.
function post_family_tweaks__recomputer_rk3576_dma_heap_permissions() {
	display_alert "$BOARD" "Setting DMA heap permissions for Mali GPU" "info"

	mkdir -p "${SDCARD}/etc/udev/rules.d/"
	echo 'SUBSYSTEM=="dma_heap", GROUP="render", MODE="0660"' > "${SDCARD}/etc/udev/rules.d/50-mali-dma-heap.rules"

	# GDM greeter needs render group for DMA heap access.
	chroot_sdcard usermod -aG render Debian-gdm 2>/dev/null || true
}

# X11 — OutputClass matches rockchip DRM (card1), skips NPU (card0).
function post_family_tweaks__recomputer_rk3576_x11_kms_config() {
	display_alert "$BOARD" "Configuring X11 for Rockchip KMS" "info"

	mkdir -p "${SDCARD}"/etc/X11/xorg.conf.d/
	cat > "${SDCARD}"/etc/X11/xorg.conf.d/10-rockchip-kms.conf <<-'EOF'
Section "OutputClass"
    Identifier  "RockchipDRM"
    MatchDriver "rockchip"
    Driver      "modesetting"
    Option      "PrimaryGPU"     "yes"
EndSection
EOF
}

# GDM — force X11 (Mutter Wayland SIGSEGV with Mali blob)
function post_family_tweaks__recomputer_rk3576_gdm_config() {
	display_alert "$BOARD" "Configuring GDM for X11" "info"

	mkdir -p "${SDCARD}"/etc/gdm3/
	cat > "${SDCARD}"/etc/gdm3/custom.conf <<-'EOF'
[daemon]
WaylandEnable=false

[security]

[xdmcp]

[chooser]

[debug]
EOF
}

# Disable suspend and hibernation
function post_family_tweaks__recomputer_rk3576_disable_suspend() {
	display_alert "$BOARD" "Disabling suspend and hibernation" "info"

	mkdir -p "${SDCARD}"/etc/systemd/sleep.conf.d
	cat > "${SDCARD}"/etc/systemd/sleep.conf.d/nosuspend.conf <<-'EOF'
[Sleep]
AllowSuspend=no
AllowHibernation=no
AllowSuspendThenHibernate=no
AllowHybridSleep=no
EOF
}

# Mali EGL — replace libglvnd with Mali, restore Mesa libgbm.
function post_family_tweaks__recomputer_rk3576_mali_egl_override() {
	display_alert "$BOARD" "Replacing libglvnd EGL/GLES with Mali" "info"
	local LIB_DIR="${SDCARD}/usr/lib/aarch64-linux-gnu"

	# Remove libglvnd ELF files — ldconfig restores soname symlinks from their SONAME.
	for f in libEGL.so.1.1.0 libGLESv2.so.2.1.0; do
		rm -f "${LIB_DIR}/${f}"
	done

	# Replace soname symlinks with direct Mali links
	for f in libEGL.so.1 libGLESv2.so.2; do
		rm -f "${LIB_DIR}/${f}"
		ln -sf libmali.so.1 "${LIB_DIR}/${f}"
	done

	# Mali EGL vendor JSON for libglvnd-aware apps
	mkdir -p "${SDCARD}"/usr/share/glvnd/egl_vendor.d/
	cat > "${SDCARD}"/usr/share/glvnd/egl_vendor.d/00_mali.json <<-'EOF'
{
    "file_format_version" : "1.0.0",
    "ICD" : {
        "library_path" : "libEGL.so.1"
    }
}
EOF

	# Clean up legacy Mali install approaches
	rm -rf "${LIB_DIR}/mali"
	rm -f "${SDCARD}"/etc/ld.so.conf.d/00-aarch64-mali.conf

	# Restore Mesa libgbm — Mali's GBM writes XBGR, VOP expects XRGB (red/blue inversion).
	if [[ -f "${LIB_DIR}/libgbm.so.1.0.0" ]]; then
		rm -f "${LIB_DIR}/libgbm.so.1"
		ln -sf libgbm.so.1.0.0 "${LIB_DIR}/libgbm.so.1"
	fi

	chroot_sdcard ldconfig
}

# Ensure libmali-hook soname symlink is correct.
function post_family_tweaks__recomputer_rk3576_mali_hook() {
	local HOOK_DIR="${SDCARD}/usr/lib/aarch64-linux-gnu"

	if [[ -f "${HOOK_DIR}/libmali-hook.so.1.9.0" ]]; then
		rm -f "${HOOK_DIR}/libmali-hook.so.1" "${HOOK_DIR}/libmali-hook.so"
		ln -sf libmali-hook.so.1.9.0 "${HOOK_DIR}/libmali-hook.so.1"
		ln -sf libmali-hook.so.1 "${HOOK_DIR}/libmali-hook.so"
	fi
}
