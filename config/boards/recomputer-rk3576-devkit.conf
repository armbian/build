#Seeed Studio Rockchip RK3576 octa core 4/8/16GB RAM SoC 
BOARD_NAME="reComputer RK3576 Devkit"
BOARDFAMILY="rk35xx"
BOOT_SOC="rk3576"
BOARD_MAINTAINER="Seeed Studio"
BOOTCONFIG="recomputer-rk3576-devkit_defconfig"
KERNEL_TARGET="vendor"
KERNEL_TEST_TARGET="vendor"
FULL_DESKTOP="yes"
BOOT_LOGO="desktop"
BOOT_FDT_FILE="rockchip/rk3576-recomputer-rk3576-devkit.dtb"
BOOT_SCENARIO="spl-blobs"
BOOT_SUPPORT_SPI="yes"
BOOT_SPI_RKSPI_LOADER="yes"
IMAGE_PARTITION_TABLE="gpt"
OTA_ENABLE="yes"
# FCS960K driver is aic8800 wireless driver, so we enable it here
# Note: bluez is installed via pre_install_distribution_specific__install_custom_bluez hook
PACKAGE_LIST_BOARD="firefox-esr net-tools rfkill bluetooth bluez-tools pulseaudio-module-bluetooth"
AIC8800_TYPE="sdio"
enable_extension "radxa-aic8800"


if [[ "${ENABLE_SEEED_RK_EXTENSION}" == "yes" ]]; then
	# Fetch Seeed custom extensions before enabling the Seeed entrypoint.
	if [[ ! -d "${SRC}/extensions/seeed_armbian_extension" ]]; then
		echo "[${BOARD_NAME}] Cloning Seeed extensions from GitHub..."
		git clone https://github.com/Seeed-Studio/seeed_armbian_extension.git "${SRC}/extensions/seeed_armbian_extension" || {
			echo "[${BOARD_NAME}] Warning: Failed to clone Seeed extensions"
		}
	else
		echo "[${BOARD_NAME}] Seeed extensions already exists, pulling updates..."
		git -C "${SRC}/extensions/seeed_armbian_extension" pull || echo "[${BOARD_NAME}] Warning: Failed to pull updates"
	fi

	enable_extension "seeed_armbian_extension"
fi


# Install custom bluez package for FCS960K support
function pre_install_distribution_specific__install_custom_bluez() {
	display_alert "Installing custom bluez for FCS960K" "fcs960k-aic-bluez" "info"

	local bluez_url="https://github.com/Seeed-Studio/seeed_armbian_extension/releases/download/v1.0/fcs960k-aic-bluez_5.66-1_arm64.deb"
	local bluez_deb="${SRC}/cache/download/fcs960k-aic-bluez_5.66-1_arm64.deb"

	# Create cache directory
	mkdir -p "${SRC}/cache/download"

	# Download if not already cached
	if [[ ! -f "${bluez_deb}" ]]; then
		display_alert "Downloading custom bluez package" "${bluez_url}" "info"
		wget "${bluez_url}" -O "${bluez_deb}" || {
			display_alert "Failed to download custom bluez" "fcs960k-aic-bluez" "err"
			return 1
		}
	fi

	# Install using Armbian's helper function
	install_deb_chroot "${bluez_deb}" "" "" ""

	display_alert "Custom bluez installed successfully" "fcs960k-aic-bluez" "info"
}

