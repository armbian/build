	display_alert "Installing USB gadget package" "usbdevice-gadget-rk3576" "info"

	local gadget_url="https://github.com/Seeed-Studio/seeed_armbian_extension/releases/download/v1.0/usbdevice-gadget-rk3588_1.0.0_arm64.deb"
	local gadget_deb="${SRC}/cache/download/usbdevice-gadget-rk3588_1.0.0_arm64.deb"

	# Create cache directory
	mkdir -p "${SRC}/cache/download"

	# Download if not already cached
	if [[ ! -f "${gadget_deb}" ]]; then
		display_alert "Downloading USB gadget package" "${gadget_url}" "info"
		wget "${gadget_url}" -O "${gadget_deb}" || {
			display_alert "Failed to download USB gadget package" "usbdevice-gadget-rk3576" "err"
			return 1
		}
	fi

	# Install using Armbian's helper function
	install_deb_chroot "${gadget_deb}" "" "" ""

	display_alert "USB gadget package installed successfully" "usbdevice-gadget-rk3576" "info"
}
