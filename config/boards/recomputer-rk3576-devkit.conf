# Install Morse Wireless tools (FGH100M support)
# Note: Extract and copy files directly without deb installation
function pre_install_distribution_specific__install_morse_tools() {
	display_alert "Installing Morse wireless tools for FGH100M" "morse-tools" "info"

	local cache_dir="${SRC}/cache/download"
	local extract_dir="${SRC}/cache/morse-tools-extract"
	mkdir -p "${cache_dir}" "${extract_dir}"

	# Define packages - no conflicts expected due to 'morse-' prefix naming
	declare -A packages=(
		["wpa-supplicant-morse-tools"]="https://github.com/Seeed-Studio/seeed_armbian_extension/releases/download/v1.0/wpa-supplicant-morse-tools_1.0-1_arm64.deb"
		["morsectrl-tools"]="https://github.com/Seeed-Studio/seeed_armbian_extension/releases/download/v1.0/morsectrl-tools_1.0-1_arm64.deb"
		["hostapd-morse-tools"]="https://github.com/Seeed-Studio/seeed_armbian_extension/releases/download/v1.0/hostapd-morse-tools_1.0-1_arm64.deb"
	)

	# Download, extract and install each package
	for pkg_name in "${!packages[@]}"; do
		local pkg_url="${packages[$pkg_name]}"
		local pkg_file="${cache_dir}/${pkg_name}_1.0-1_arm64.deb"

		# Download if not already cached
		if [[ ! -f "${pkg_file}" ]]; then
			display_alert "Downloading ${pkg_name}" "${pkg_url}" "info"
			wget "${pkg_url}" -O "${pkg_file}" || {
				display_alert "Failed to download ${pkg_name}" "${pkg_name}" "err"
				continue
			}
		fi

		# Extract deb package
		display_alert "Extracting ${pkg_name}" "morse-tools" "info"
		rm -rf "${extract_dir}/${pkg_name}"
		mkdir -p "${extract_dir}/${pkg_name}"
		dpkg-deb -x "${pkg_file}" "${extract_dir}/${pkg_name}"

		# Copy files directly to rootfs
		display_alert "Copying ${pkg_name} files" "morse-tools" "info"
		cp -r "${extract_dir}/${pkg_name}"/* "${SDCARD}/"
	done

	display_alert "Morse wireless tools installed successfully" "morse-tools" "info"
}

function post_family_tweaks_bsp__aic8800_wireless() {
	display_alert "$BOARD" "Installing AIC8800 Tweaks" "info"
	mkdir -p "${destination}"/etc/modprobe.d
	mkdir -p "${destination}"/etc/modules-load.d
	# Add wireless conf
	cat > "${destination}"/etc/modprobe.d/aic8800-wireless.conf <<- EOT
	options aic8800_fdrv_sdio aicwf_dbg_level=0 custregd=0 ps_on=0
	#options aic8800_bsp_sdio aic_fw_path=/lib/firmware/aic8800_fw/SDIO/aic8800
	EOT
	# Add needed bluetooth modules
	cat > "${destination}"/etc/modules-load.d/aic8800-btlpm.conf <<- EOT
	hidp
	rfcomm
	bnep
	aic8800_btlpm_sdio
	EOT
	# Add AIC8800 Bluetooth Service and Script
	if [[ -d "$SRC/packages/bsp/aic8800" ]]; then
		install -d -m 0755 "${destination}/usr/bin"
		install -m 0755 "$SRC/packages/bsp/aic8800/aic-bluetooth" "${destination}/usr/bin/aic-bluetooth"
		sed -i 's|/dev/ttyS1|/dev/ttyS4|g' "${destination}/usr/bin/aic-bluetooth" #our bt uart is on ttyS4
		install -d -m 0755 "${destination}/usr/lib/systemd/system"
		install -m 0644 "$SRC/packages/bsp/aic8800/aic-bluetooth.service" "${destination}/usr/lib/systemd/system/aic-bluetooth.service"
	else
		display_alert "$BOARD" "Skipping AIC8800 BT assets (packages/bsp/aic8800 not found)" "warn"
	fi
}

function post_family_tweaks_bsp__fgh100m_morse_firmware() {
    local morse_fw_rev="commit:974c7744263ffb56a1c8678962e740fdcb3428f7"

    fetch_from_repo "https://github.com/MorseMicro/morse-firmware.git" "morse-firmware" "${morse_fw_rev}" "yes"

    local morse_fw_dir="${SRC}/cache/sources/morse-firmware/${morse_fw_rev#*:}"

    if [[ -d "${morse_fw_dir}" ]]; then
        # Prefer standard firmware location so request_firmware() can find it
        install -d -m 0755 "${destination}/lib/firmware/morse"
        install -m 0644 "${morse_fw_dir}/bcf/quectel/bcf_fgh100mhaamd.bin" "${destination}/lib/firmware/morse/bcf_default.bin"
        install -m 0644 "${morse_fw_dir}/firmware/mm6108.bin" "${destination}/lib/firmware/morse/mm6108.bin"
    else
        display_alert "$BOARD" "morse-firmware not found at ${morse_fw_dir}" "warn"
    fi
}

# Enable AIC8800 Bluetooth Service
function post_family_tweaks__enable_aic8800_bluetooth_service() {
	display_alert "$BOARD" "Enabling AIC8800 Bluetooth Service" "info"
	if chroot_sdcard test -f /lib/systemd/system/aic-bluetooth.service || chroot_sdcard test -f /etc/systemd/system/aic-bluetooth.service; then
		chroot_sdcard systemctl --no-reload enable aic-bluetooth.service
	else
		display_alert "$BOARD" "aic-bluetooth.service not found in image; skipping enable" "warn"
	fi
}

function pre_umount_final_image__change_bt_uart_config() {
	if [[ -d "$SRC/packages/bsp/aic8800" ]]; then
		run_host_command_logged sed -i "s\|/dev/ttyS1\|/dev/ttyS4\|g" "${MOUNT}/usr/bin/aic-bluetooth"
	else
		display_alert "$BOARD" "Skipping AIC8800 BT assets (packages/bsp/aic8800 not found)" "warn"
	fi
}

function custom_kernel_config__my_customizations() {
	if [[ -f .config ]]; then
		display_alert "Applying custom kernel config for recomputer-rk3576" "armbian-kernel" "info"

		# GPIO PCA953X - enable as built-in (needed for I2C GPIO expander)
		kernel_config_set_y CONFIG_GPIO_PCA953X

		# RTC driver PCF8563 - enable as built-in
		kernel_config_set_y CONFIG_RTC_DRV_PCF8563

		# Morse Wireless (FGH100M) configuration
		kernel_config_set_m CONFIG_WLAN_VENDOR_MORSE
		kernel_config_set_y CONFIG_MORSE_SPI
		kernel_config_set_y CONFIG_MORSE_USER_ACCESS
		kernel_config_set_y CONFIG_MORSE_VENDOR_COMMAND
		kernel_config_set_y CONFIG_MORSE_MONITOR
		kernel_config_set_y CONFIG_MAC80211_MESH
		kernel_config_set_val CONFIG_MORSE_DEBUG_MASK "1"

		# Regulator for Raspberry Pi Touchscreen V2 and camera v3
		kernel_config_set_y CONFIG_REGULATOR_RASPBERRYPI_TOUCHSCREEN_V2
		kernel_config_set_y CONFIG_VIDEO_IMX708
		kernel_config_set_y CONFIG_VIDEO_DW9800W
		kernel_config_set_y CONFIG_REGULATOR_AD5398
		# fan
		kernel_config_set_y CONFIG_SENSORS_PWM_FAN
	fi
}


function post_family_tweaks__recomputer-rk3576-devkit_naming_audios() {
	display_alert "$BOARD" "Renaming recomputer-rk3576-devkit audios" "info"

	mkdir -p $SDCARD/etc/udev/rules.d/
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-hdmi0-sound", ENV{SOUND_DESCRIPTION}="HDMI0 Audio"' > $SDCARD/etc/udev/rules.d/90-naming-audios.rules
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-dp0-sound", ENV{SOUND_DESCRIPTION}="DP0 Audio"' >> $SDCARD/etc/udev/rules.d/90-naming-audios.rules
	echo 'SUBSYSTEM=="sound", ENV{ID_PATH}=="platform-es8311-sound", ENV{SOUND_DESCRIPTION}="ES8311 Audio"' >> $SDCARD/etc/udev/rules.d/90-naming-audios.rules
	return 0
}

function post_family_tweaks__recomputer-rk3576-devkit_gmd_x11_config() {
	display_alert "$BOARD" "Configuring X11 for Rockchip KMS" "info"

	# mkdir -p $SDCARD/etc/udev/rules.d/
	# echo 'ACTION=="change", SUBSYSTEM=="drm", ENV{HOTPLUG}=="1", RUN+="/bin/systemctl restart display-manager.service"' >> $SDCARD/etc/udev/rules.d/99-hdmi-hotplug.rules
	mkdir -p $SDCARD/etc/X11/xorg.conf.d/

	# Configure X11 to use modesetting driver with Rockchip KMS
	# Uses /dev/dri/card1 as the primary GPU
	cat > $SDCARD/etc/X11/xorg.conf.d/10-rockchip-kms.conf <<-'EOF'
Section "Device"
    Identifier  "Rockchip-KMS"
    Driver      "modesetting"
    Option      "kmsdev" "/dev/dri/card1"
    Option      "PrimaryGPU" "true"
EndSection
EOF

	return 0
}

# Add /usr/sbin and /sbin to PATH for all users
function post_family_tweaks__recomputer-rk3576-devkit_add_sbin_to_path() {
	display_alert "$BOARD" "Adding sbin directories to PATH" "info"

	mkdir -p $SDCARD/etc/profile.d
	cat > $SDCARD/etc/profile.d/custom-path.sh <<-'EOF'
# Add sbin directories to PATH for ifconfig and other admin tools
if [ -d /usr/sbin ] && [[ ":$PATH:" != *":/usr/sbin:"* ]]; then
    PATH="/usr/sbin:$PATH"
fi
if [ -d /sbin ] && [[ ":$PATH:" != *":/sbin:"* ]]; then
    PATH="/sbin:$PATH"
fi
export PATH
EOF

	chmod +x $SDCARD/etc/profile.d/custom-path.sh
	display_alert "Custom PATH configuration added" "/usr/sbin:/sbin" "info"
}

# Disable suspend and hibernation
function post_family_tweaks__recomputer-rk3576-devkit_disable_suspend() {
	display_alert "$BOARD" "Disabling suspend and hibernation" "info"

	mkdir -p $SDCARD/etc/systemd/sleep.conf.d
	cat > $SDCARD/etc/systemd/sleep.conf.d/nosuspend.conf <<-'EOF'
[Sleep]
AllowSuspend=no
AllowHibernation=no
AllowSuspendThenHibernate=no
AllowHybridSleep=no
EOF

	display_alert "Suspend and hibernation disabled" "nosuspend.conf" "info"
}

function post_family_tweaks__recomputer-rk3576-devkit_disable_armbian_hardware_optimize() {
	display_alert "$BOARD" "Removing armbian-hardware-optimize.service" "info"

	rm -f "${SDCARD}/lib/systemd/system/armbian-hardware-optimize.service"
	rm -f "${SDCARD}/usr/lib/armbian/armbian-hardware-optimization"
	rm -f "${SDCARD}/etc/systemd/system/basic.target.wants/armbian-hardware-optimize.service"
}

# Install USB gadget package for RK3576
