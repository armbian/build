# Rockchip RK3568 quad core 4GB SoC GBe eMMC USB3
BOARD_NAME="EasePi-A2"
BOARD_VENDOR="LinkEase"
BOARDFAMILY="rk35xx"
BOARD_MAINTAINER="ifroncy01"
INTRODUCED="2026"
BOOTCONFIG="easepi-a2-rk3568_defconfig"
KERNEL_TARGET="current,edge,bleedingedge,vendor"
KERNEL_TEST_TARGET="current,vendor"
FULL_DESKTOP="yes"
BOOT_LOGO="desktop"
BOOT_FDT_FILE="rockchip/rk3568-easepi-a2.dtb"
BOOT_SCENARIO="spl-blobs"
IMAGE_PARTITION_TABLE="gpt"
BOOT_ENV_FILE="armbianEnv.txt"
PACKAGE_LIST_BOARD="i2c-tools fonts-dejavu-core rfkill bluetooth bluez bluez-tools ir-keytable"

# ==================== uboot config ====================
function post_family_config__easepi_a2_use_mainline_uboot_except_vendor() {
	if [[ "${BRANCH}" == "vendor" ]]; then
		display_alert "$BOARD" "Vendor: using vendor U-Boot + kernel, enabling hciattach BT" "info"
		return 0
	fi

	display_alert "$BOARD" "Mainline (${BRANCH}): using mainline U-Boot + kernel serdev BT" "info"
	declare -g BOOTSOURCE="https://github.com/u-boot/u-boot"
	declare -g BOOTBRANCH="tag:v2025.10"
	declare -g BOOTPATCHDIR="v2025.10"
	declare -g BOOTDIR="u-boot-${BOARD}"
	declare -g UBOOT_TARGET_MAP="BL31=${RKBIN_DIR}/${BL31_BLOB} ROCKCHIP_TPL=${RKBIN_DIR}/${DDR_BLOB};;u-boot-rockchip.bin"
	unset uboot_custom_postprocess write_uboot_platform write_uboot_platform_mtd

	function write_uboot_platform() {
		dd "if=$1/u-boot-rockchip.bin" "of=$2" bs=32k seek=1 conv=notrunc status=none
	}
}

# ==================== OLED Module ====================
function post_family_tweaks_bsp__easepi_a2_install_oled_files() {
	display_alert "EasePi-A2" "Installing OLED files from BSP" "info"

	install -D -m 0755 "${SRC}/packages/bsp/easepi/easepi-a2/oled" \
		"${destination}/usr/local/oled/oled"
	install -D -m 0644 "${SRC}/packages/bsp/easepi/easepi-a2/oled.service" \
		"${destination}/etc/systemd/system/oled.service"

	ln -sf /usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf \
		"${destination}/usr/local/oled/DejaVuSansMono.ttf"

	mkdir -p "${destination}"/etc/modules-load.d
	cat > "${destination}"/etc/modules-load.d/i2c-dev.conf <<- EOT
	i2c-dev
	EOT
}

function post_customize_image__enable_easepi_a2_oled_service() {
	if [ -x "${SDCARD}"/usr/local/oled/oled ]; then
		chroot_sdcard systemctl enable oled.service
		display_alert "EasePi-A2" "OLED service enabled" "info"
	else
		display_alert "EasePi-A2" "Skipping oled.service (OLED binary not available)" "wrn"
	fi
}

# ==================== IR Module ====================
function post_family_tweaks_bsp__easepi_a2_install_ir_files() {
	display_alert "EasePi-A2" "Installing IR files from BSP" "info"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/ir_remote" \
		"${destination}/etc/rc_keymaps/ir_remote"
	install -D -m 0755 "${SRC}/packages/bsp/easepi/ir.sh" \
		"${destination}/usr/local/ir/ir.sh"
	install -D -m 0644 "${SRC}/packages/bsp/easepi/ir.service" \
		"${destination}/etc/systemd/system/ir.service"

	cat > "${destination}"/etc/modules-load.d/ir.conf <<- EOT
	gpio_ir_recv
	ir_nec_decoder
	EOT
}

function post_customize_image__enable_easepi_a2_ir_service() {
	chroot_sdcard systemctl enable ir.service
}

# ==================== Bluetooth Module ====================
function post_family_tweaks_bsp__easepi_a2_install_bt_files() {
	display_alert "EasePi-A2" "Installing Bluetooth files from BSP" "info"

	install -D -m 0755 "${SRC}/packages/bsp/easepi/bt-hciattach.sh" \
		"${destination}/usr/local/sbin/bt-hciattach.sh"
	install -D -m 0644 "${SRC}/packages/bsp/easepi/bt-hciattach.service" \
		"${destination}/lib/systemd/system/bt-hciattach.service"

	cat > "${destination}/etc/default/easepi-bt" <<- EOT
	# EasePi-A2 Bluetooth device configuration
	BOARD_NAME="EasePi-A2"
	BT_UART_DEVICE="/dev/ttyS8"
	BT_BAUD_RATE="1500000"
	BT_CHIP_TYPE="bcm43xx"
	EOT
}

function pre_customize_image__copy_easepi_a2_bt_firmware() {
	display_alert "EasePi-A2" "Setting up Bluetooth firmware symlinks" "info"

	if [ -f "${SDCARD}/lib/firmware/BCM4345C0.hcd" ]; then
		ln -sf ../BCM4345C0.hcd "${SDCARD}/lib/firmware/brcm/BCM4345C0.hcd" || \
		ln -sf BCM4345C0.hcd "${SDCARD}/lib/firmware/brcm/BCM4345C0.hcd"
		ln -sf BCM4345C0.hcd "${SDCARD}/lib/firmware/brcm/BCM4345C0.easepi,a2.hcd"
	fi
	if [ -f "${SDCARD}/lib/firmware/brcm/brcmfmac43455-sdio.bin" ]; then
		ln -sf brcmfmac43455-sdio.bin "${SDCARD}/lib/firmware/brcm/brcmfmac43455-sdio.easepi,a2.bin"
	fi
	if [ -f "${SDCARD}/lib/firmware/brcm/brcmfmac43455-sdio.txt" ]; then
		ln -sf brcmfmac43455-sdio.txt "${SDCARD}/lib/firmware/brcm/brcmfmac43455-sdio.easepi,a2.txt"
	fi
	if [ -f "${SDCARD}/lib/firmware/brcm/brcmfmac43455-sdio.clm_blob" ]; then
		ln -sf brcmfmac43455-sdio.clm_blob "${SDCARD}/lib/firmware/brcm/brcmfmac43455-sdio.easepi,a2.clm_blob"
	fi
}

function post_customize_image__enable_easepi_a2_bt_services() {
	if [[ "${BRANCH}" == "vendor" ]]; then
		display_alert "EasePi-A2" "Enabling bt-hciattach.service (vendor kernel)" "info"
		chroot_sdcard systemctl enable bt-hciattach.service
	else
		display_alert "EasePi-A2" "Mainline kernel serdev handles BT" "info"
	fi
	chroot_sdcard systemctl enable bluetooth.service
}