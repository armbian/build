# Rockchip RK3568 quad core 4GB SoC GBe eMMC USB3
BOARD_NAME="EasePi-A2"
BOARD_VENDOR="EasePi"
BOARDFAMILY="rk35xx"
BOARD_MAINTAINER="Ifroncy"
INTRODUCED="2025"
BOOTCONFIG="easepi-a2-rk3568_defconfig"
KERNEL_TARGET="current,edge,vendor"
KERNEL_TEST_TARGET="current,vendor"
FULL_DESKTOP="yes"
BOOT_LOGO="desktop"
BOOT_FDT_FILE="rockchip/rk3568-easepi-a2.dtb"
BOOT_SCENARIO="spl-blobs"
BOOT_SUPPORT_SPI="no"
BOOT_SPI_RKSPI_LOADER="no"
IMAGE_PARTITION_TABLE="gpt"
BOOT_SCRIPT="boot-rk35xx.cmd"
BOOT_ENV_FILE="armbianEnv.txt"

# Enable OLED + IR + Bluetooth extension for EasePi-A2
# bluetooth-hciattach 已整合到 easepi-a2-peripherals 中，无需单独启用
# 注意：所有分支共用此扩展，扩展内部根据 BRANCH 自动适配：
#   - vendor: 生成 hciattach 服务（vendor 内核使用 bluetooth-platdata，需用户态初始化）
#   - current/edge: 跳过 hciattach 服务（主线内核 serdev 自动初始化蓝牙）
# OLED/I2C 配置所有分支通用，无需区分
ENABLE_EXTENSIONS="${ENABLE_EXTENSIONS} easepi-a2-peripherals"

# Bluetooth HCI attach config for AP6255 on uart8 (serial@fe6c0000)
# 仅 vendor 分支需要 hciattach（vendor 内核使用 bluetooth-platdata，需用户态初始化）
# vendor 内核中 uart8 → ttyS8（aliases: serial8=/serial@fe6c0000）
# 主线内核通过 serdev 自动处理蓝牙，此参数不会被消费，无影响
declare -g BLUETOOTH_HCIATTACH_PARAMS="-s 115200 /dev/ttyS8 bcm43xx 1500000"
declare -g BLUETOOTH_HCIATTACH_RKFILL_NUM="all"

# Additional packages (Bluetooth/IR packages handled by easepi-a2-peripherals extension)
PACKAGE_LIST_EXTRA="${PACKAGE_LIST_EXTRA} i2c-tools ir-keytable fonts-dejavu-core"

function post_family_config__easepi-a2_use_mainline_uboot_except_vendor() {
	if [[ "${BRANCH}" == "vendor" ]]; then
		display_alert "$BOARD" "Vendor: using vendor U-Boot + kernel, enabling hciattach BT" "info"
		declare -g BOOTDELAY=5
		return 0
	fi

	# current/edge: use mainline U-Boot + kernel serdev bluetooth
	display_alert "$BOARD" "Mainline: using mainline U-Boot + kernel serdev BT" "info"
	declare -g BOOTDELAY=5
	declare -g BOOTSOURCE="https://github.com/u-boot/u-boot"
	declare -g BOOTBRANCH="tag:v2025.10"
	declare -g BOOTPATCHDIR="v2025.10"
	declare -g BOOTDIR="u-boot-${BOARD}"
	declare -g UBOOT_TARGET_MAP="BL31=${RKBIN_DIR}/${BL31_BLOB} ROCKCHIP_TPL=${RKBIN_DIR}/${DDR_BLOB};;u-boot-rockchip.bin"
	unset uboot_custom_postprocess write_uboot_platform write_uboot_platform_mtd

	function write_uboot_platform() {
		dd "if=$1/u-boot-rockchip.bin" "of=$2" bs=32k seek=1 conv=notrunc status=none
	}
}