# Rockchip RK3568 quad core 4GB SoC GBe eMMC USB3
BOARD_NAME="EasePi-A2"
BOARD_VENDOR="LinkEase"
BOARDFAMILY="rk35xx"
BOARD_MAINTAINER="ifroncy01"
INTRODUCED="2026"
BOOTCONFIG="easepi-a2-rk3568_defconfig"
KERNEL_TARGET="current,edge,bleedingedge,vendor"
KERNEL_TEST_TARGET="current,vendor"
FULL_DESKTOP="yes"
BOOT_LOGO="desktop"
BOOT_FDT_FILE="rockchip/rk3568-easepi-a2.dtb"
BOOT_SCENARIO="spl-blobs"
IMAGE_PARTITION_TABLE="gpt"
BOOT_ENV_FILE="armbianEnv.txt"

function post_family_config__easepi-a2_use_mainline_uboot_except_vendor() {
	if [[ "${BRANCH}" == "vendor" ]]; then
		display_alert "$BOARD" "Vendor: using vendor U-Boot + kernel, enabling hciattach BT" "info"
		return 0
	fi

	display_alert "$BOARD" "Mainline (${BRANCH}): using mainline U-Boot + kernel serdev BT" "info"
	declare -g BOOTSOURCE="https://github.com/u-boot/u-boot"
	declare -g BOOTBRANCH="tag:v2025.10"
	declare -g BOOTPATCHDIR="v2025.10"
	declare -g BOOTDIR="u-boot-${BOARD}"
	declare -g UBOOT_TARGET_MAP="BL31=${RKBIN_DIR}/${BL31_BLOB} ROCKCHIP_TPL=${RKBIN_DIR}/${DDR_BLOB};;u-boot-rockchip.bin"
	unset uboot_custom_postprocess write_uboot_platform write_uboot_platform_mtd

	function write_uboot_platform() {
		dd "if=$1/u-boot-rockchip.bin" "of=$2" bs=32k seek=1 conv=notrunc status=none
	}
}

function extension_prepare_config__easepi-a2-peripherals() {
	display_alert "EasePi-A2" "Peripherals extension (OLED + IR + Bluetooth) prepared" "info"
}

function post_family_config__easepi_a2_add_bluetooth_packages() {
	display_alert "EasePi-A2" "Adding bluetooth packages to image" "info"
	add_packages_to_image rfkill bluetooth bluez bluez-tools
}

function post_family_config__easepi_a2_add_oled_packages() {
	display_alert "EasePi-A2" "Adding OLED + IR packages to image" "info"
	add_packages_to_image i2c-tools ir-keytable fonts-dejavu-core
}

function post_family_tweaks_bsp__easepi_a2_bluetooth_hciattach() {
	display_alert "EasePi-A2" "Installing bluetooth hciattach files from BSP" "info"

	install -D -m 0755 "${SRC}/packages/bsp/easepi/common/bluetooth-hciattach.sh" \
		"${destination}/usr/local/sbin/bluetooth-hciattach.sh"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/common/bluetooth-hciattach.service" \
		"${destination}/lib/systemd/system/bluetooth-hciattach.service"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/easepi-a2/easepi-bt.conf" \
		"${destination}/etc/default/easepi-bt"
}

function post_family_tweaks_bsp__easepi_a2_common_peripherals() {
	display_alert "EasePi-A2" "Installing EasePi peripheral files from BSP" "info"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/common/easepi_remote" \
		"${destination}/etc/rc_keymaps/easepi_remote"

	install -D -m 0755 "${SRC}/packages/bsp/easepi/common/easepi-fix-infrared.sh" \
		"${destination}/usr/local/ir/fix_infrared.sh"

	install -D -m 0755 "${SRC}/packages/bsp/easepi/common/ir-setup.sh" \
		"${destination}/usr/local/ir/ir-setup.sh"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/common/ir-keymap.service" \
		"${destination}/etc/systemd/system/ir-keymap.service"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/common/infrared.conf" \
		"${destination}/etc/modules-load.d/infrared.conf"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/easepi-a2/i2c-dev.conf" \
		"${destination}/etc/modules-load.d/i2c-dev.conf"

	install -D -m 0644 "${SRC}/packages/bsp/easepi/easepi-a2/oled.service" \
		"${destination}/etc/systemd/system/oled.service"
}

function pre_customize_image__copy_easepi_a2_files() {
	display_alert "EasePi-A2" "Installing A2 dynamic assets (OLED binary, firmware symlinks)" "info"

	# OLED daemon configuration
	local OLED_REPO_URL="https://github.com/ifroncy01/easepi-oled-daemon"
	local OLED_RELEASE="v1.0.0"
	local OLED_BASE_URL="${OLED_REPO_URL}/releases/download/${OLED_RELEASE}"
	local OLED_BIN_NAME="oled-linux-arm64"
	local EXPECTED_SUM="041f3e98550c55c784e3e06d9af02f35ec835a79a23408ebd7132df399cfceb6"
	local CACHE_DIR="${SRC}/cache/easepi-oled-daemon"
	local CACHED_FILE="${CACHE_DIR}/${OLED_BIN_NAME}"

	run_host_command_logged mkdir -p "${CACHE_DIR}"

	local USE_CACHE=false
	if [ -f "${CACHED_FILE}" ]; then
		local CACHED_SUM=$(sha256sum "${CACHED_FILE}" | cut -d' ' -f1)
		if [[ "${EXPECTED_SUM}" == "${CACHED_SUM}" ]]; then
			display_alert "EasePi-A2" "Using cached OLED binary" "info"
			USE_CACHE=true
		fi
	fi

	if [[ "${USE_CACHE}" == false ]]; then
		display_alert "EasePi-A2" "Downloading OLED Go binary from ${OLED_REPO_URL}" "info"
		if curl -fsSL -o "${CACHED_FILE}" "${OLED_BASE_URL}/${OLED_BIN_NAME}"; then
			local DOWNLOAD_SUM=$(sha256sum "${CACHED_FILE}" | cut -d' ' -f1)
			if [[ "${EXPECTED_SUM}" != "${DOWNLOAD_SUM}" ]]; then
				display_alert "EasePi-A2" "OLED binary SHA-256 mismatch; skipping OLED" "wrn"
				rm -f "${CACHED_FILE}"
			else
				display_alert "EasePi-A2" "OLED binary downloaded and verified" "info"
			fi
		else
			display_alert "EasePi-A2" "Failed to download OLED binary; skipping OLED" "wrn"
			rm -f "${CACHED_FILE}" 2>/dev/null
		fi
	fi

	# Install OLED binary if available
	if [ -f "${CACHED_FILE}" ]; then
		install -D -m 0755 "${CACHED_FILE}" "${SDCARD}/usr/local/oled/oled"
		display_alert "EasePi-A2" "OLED binary installed successfully" "info"
	fi

	# Install font
	ln -sf /usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf \
		"${SDCARD}/usr/local/oled/DejaVuSansMono.ttf"

	# Bluetooth firmware symlinks
	if [ -f "${SDCARD}/lib/firmware/BCM4345C0.hcd" ]; then
		ln -sf ../BCM4345C0.hcd "${SDCARD}/lib/firmware/brcm/BCM4345C0.hcd" || \
		ln -sf BCM4345C0.hcd "${SDCARD}/lib/firmware/brcm/BCM4345C0.hcd"
		ln -sf BCM4345C0.hcd "${SDCARD}/lib/firmware/brcm/BCM4345C0.easepi,a2.hcd"
	fi
	if [ -f "${SDCARD}/lib/firmware/brcm/brcmfmac43455-sdio.bin" ]; then
		ln -sf brcmfmac43455-sdio.bin "${SDCARD}/lib/firmware/brcm/brcmfmac43455-sdio.easepi,a2.bin"
	fi
	if [ -f "${SDCARD}/lib/firmware/brcm/brcmfmac43455-sdio.txt" ]; then
		ln -sf brcmfmac43455-sdio.txt "${SDCARD}/lib/firmware/brcm/brcmfmac43455-sdio.easepi,a2.txt"
	fi
	if [ -f "${SDCARD}/lib/firmware/brcm/brcmfmac43455-sdio.clm_blob" ]; then
		ln -sf brcmfmac43455-sdio.clm_blob "${SDCARD}/lib/firmware/brcm/brcmfmac43455-sdio.easepi,a2.clm_blob"
	fi
}

function post_customize_image__enable_easepi_a2_services() {
	display_alert "EasePi-A2" "Enabling A2 peripheral services (BRANCH=${BRANCH})" "info"

	if [ -x "${SDCARD}"/usr/local/oled/oled ]; then
		chroot_sdcard systemctl enable oled.service
		display_alert "EasePi-A2" "OLED service enabled" "info"
	else
		display_alert "EasePi-A2" "Skipping oled.service (OLED binary not available)" "wrn"
	fi

	chroot_sdcard systemctl enable ir-keymap.service

	if [[ "${BRANCH}" == "vendor" ]]; then
		display_alert "EasePi-A2" "Enabling bluetooth-hciattach.service (vendor kernel)" "info"
		chroot_sdcard systemctl enable bluetooth-hciattach.service
	else
		display_alert "EasePi-A2" "Mainline kernel serdev handles BT" "info"
	fi
	chroot_sdcard systemctl enable bluetooth.service
}