# BeagleBadge Texas Instruments AM62L dual core 256MB WiFi BT LoRaWAN OSPI DSI ePaper

BOARD_NAME="BeagleBadge"
BOARD_VENDOR="beagleboard"
BOARDFAMILY="k3"
BOARD_MAINTAINER="Grippy98"
INTRODUCED="2026"
BOOT_SOC="am62l"
BOOTCONFIG="am62lx_badge_defconfig"
BOOTFS_TYPE="fat"
BOOT_FDT_FILE="ti/k3-am62l3-badge.dts"
TIBOOT3_FILE="tiboot3.bin"
DEFAULT_CONSOLE="serial"
KERNEL_TARGET="vendor,vendor-rt,vendor-edge"
KERNEL_TEST_TARGET="vendor"
SERIALCON="ttyS2"
ATF_PLAT="k3low"
ATF_BOARD="am62l3-badge"
EXTRA_ATF_TARGETS="build/${ATF_PLAT}/${ATF_BOARD}/release/bl1.bin:bl1.bin"
OPTEE_ARGS="CFG_TEE_CORE_LOG_LEVEL=1"
OPTEE_PLATFORM="k3-am62lx"
EXTRA_BOOT_ARGS="BL1=bl1.bin"
CC33XX_SUPPORT="yes"
PACKAGE_LIST_BOARD="network-manager bluetooth bluez-tools"
# TI_PACKAGES+=("badge-launcher")
enable_extension "lowmem"

# =======================================================================
# MEMORY, SERVICES, & KERNEL CONFIGURATION
#
# post_customize_image__ hooks run after install_distribution_agnostic(),
# preventing conflicts with Armbian's standard service enabling
#
# pre_umount_final_image__ hooks run after the lowmem extension, allowing
# beaglebadge-specific overrides
# =======================================================================

function pre_umount_final_image__zz_beaglebadge_configure_zram() {
	display_alert "$BOARD" "Configuring ZRAM (overriding lowmem)" "info"

	sed -i "s/^#\?\s*SWAP=.*/# SWAP=false/" "${MOUNT}"/etc/default/armbian-zram-config
	sed -i "s/^#\?\s*SWAP_ALGORITHM=.*/SWAP_ALGORITHM=zstd/" "${MOUNT}"/etc/default/armbian-zram-config
	sed -i "s/^#\?\s*SWAP_PRIORITY=.*/SWAP_PRIORITY=100/" "${MOUNT}"/etc/default/armbian-zram-config

	display_alert "$BOARD" "ZRAM configured: 50% of physical RAM (zstd, priority 100)" "info"
}

function post_customize_image__beaglebadge_10_enable_cc33xx_ble() {
	display_alert "$BOARD" "Configuring CC33xx udev rule for BLE" "info"

	mkdir -p "${SDCARD}"/etc/udev/rules.d/
	cat <<-EOF > "${SDCARD}"/etc/udev/rules.d/99-cc33xx-ble.rules
	# Enable BLE when the cc33xx wlan physical interface initializes
	ACTION=="add", SUBSYSTEM=="ieee80211", KERNEL=="phy[0-9]*", DEVPATH=="*cc33xx*", RUN+="/bin/sh -c 'sleep 1; echo 1 > /sys/kernel/debug/ieee80211/%k/cc33xx/ble_enable'"
	EOF
}

function post_customize_image__beaglebadge_20_configure_apt() {
	display_alert "$BOARD" "Configuring APT" "info"

	# Mask APT daily timers and services
	chroot "${SDCARD}" /bin/bash -c "systemctl mask apt-daily.timer apt-daily-upgrade.timer apt-daily.service apt-daily-upgrade.service || true"

	# APT autoremove recommends/suggests
	cat <<-EOF > "${SDCARD}"/etc/apt/apt.conf.d/99-beaglebadge
	APT::AutoRemove::RecommendsImportant "0";
	APT::AutoRemove::SuggestsImportant "0";
	EOF
}

function post_customize_image__beaglebadge_30_trim_systemd() {
	display_alert "$BOARD" "Trimming systemd services" "info"

	# Services to disable (not mask - let them exist but not start)
	local services_to_disable=(
		"rsyslog.service"
		"systemd-homed.service"
		"systemd-homed-activate.service"
		"armbian-hardware-monitor.service"
		"armbian-hardware-optimize.service"
	)

	for service in "${services_to_disable[@]}"; do
		chroot "${SDCARD}" /bin/bash -c "systemctl disable ${service} || true"
	done

	# Timers to mask (these are safe and won't conflict)
	local timers_to_mask=(
		"e2scrub_all.timer"
	)

	for timer in "${timers_to_mask[@]}"; do
		chroot "${SDCARD}" /bin/bash -c "systemctl mask ${timer} || true"
		local service="${timer%.timer}.service"
		chroot "${SDCARD}" /bin/bash -c "systemctl mask ${service} || true"
	done
}

function post_customize_image__beaglebadge_40_limit_journal() {
	display_alert "$BOARD" "Limiting systemd journal size" "info"

	mkdir -p "${SDCARD}"/etc/systemd/journald.conf.d/
	cat <<-EOF > "${SDCARD}"/etc/systemd/journald.conf.d/zz-beaglebadge-journal.conf
	[Journal]
	SystemMaxFileSize=4M
	RuntimeMaxUse=8M
	RuntimeMaxFileSize=2M
	ForwardToSyslog=no
	ForwardToConsole=no
	ForwardToWall=no
	MaxLevelStore=debug
	Compress=yes
	EOF
}

function post_customize_image__beaglebadge_50_optimize_systemd_timeouts() {
	display_alert "$BOARD" "Optimizing systemd timeouts" "info"

	mkdir -p "${SDCARD}"/etc/systemd/system.conf.d/
	cat <<-EOF > "${SDCARD}"/etc/systemd/system.conf.d/99-beaglebadge.conf
	[Manager]
	DefaultTimeoutStopSec=30s
	DefaultTimeoutAbortSec=15s
	DefaultDeviceTimeoutSec=30s
	DefaultLimitNOFILE=1024:4096
	EOF

	mkdir -p "${SDCARD}"/etc/systemd/coredump.conf.d/
	cat <<-EOF > "${SDCARD}"/etc/systemd/coredump.conf.d/beaglebadge.conf
	[Coredump]
	MaxUse=128M
	EOF
}

function post_customize_image__beaglebadge_60_tune_kernel_params() {
	display_alert "$BOARD" "Tuning kernel parameters" "info"

	cat <<-EOF > "${SDCARD}"/etc/sysctl.d/99-beaglebadge.conf
	# Memory management for 256MB system
	vm.swappiness=100
	vm.page-cluster=0
	vm.watermark_scale_factor=125
	vm.compact_memory=1
	vm.vfs_cache_pressure=150
	vm.dirty_background_ratio=5
	vm.dirty_ratio=10
	vm.min_free_kbytes=8192
	vm.overcommit_memory=1

	# Minimize network buffers
	net.core.rmem_max=131072
	net.core.wmem_max=131072
	net.ipv4.tcp_rmem=4096 65536 262144
	net.ipv4.tcp_wmem=4096 16384 262144
	EOF

	grep -q '^optargs=' "${SDCARD}"/boot/uEnv.txt \
	&& sed -i "/zswap\.enabled=0/! s/^optargs=.*/& zswap.enabled=0/" "${SDCARD}"/boot/uEnv.txt \
	|| echo "optargs=zswap.enabled=0" >> "${SDCARD}"/boot/uEnv.txt
}
