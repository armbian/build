# Qualcomm SC8280XP Snapdragon 8cx Gen 3 octa core up to 32GB RAM SoC UFS NVMe microSD 2x 2.5GbE WiFi6E/BT USB-C
declare -g BOARD_NAME="Radxa Dragon Q8B"
declare -g BOARD_VENDOR="radxa"
declare -g BOARD_MAINTAINER="HeyMeco SuperKali"
declare -g INTRODUCED="2026"
declare -g BOARDFAMILY="sc8280xp"
declare -g KERNEL_TARGET="vendor,edge"
declare -g KERNEL_TEST_TARGET="vendor,edge"

declare -g BOOT_FDT_FILE="qcom/sc8280xp-radxa-dragon-q8b.dtb"

function post_family_tweaks_bsp__radxa_dragon_q8b_bluetooth_addr() {
	### The bluetooth does not have a public MAC address set in DT, and BT won't start without one.
	### Use a systemd override to hook up setting a public-addr before starting bluetoothd.
	### The address is derived on the device from /etc/machine-id, so it is stable per
	### board and unique across boards flashed from the same image.
	display_alert "Adding systemd override for bluetooth public address init" "${BOARD} :: bt mac from machine-id" "info"

	add_file_from_stdin_to_bsp_destination "/etc/systemd/system/bluetooth.service.d/override.conf" <<- 'EOD'
		[Service]
		ExecStartPre=/bin/bash -c 'sleep 5; h=$$(sha256sum /etc/machine-id | cut -c1-10); yes | btmgmt public-addr "02:$${h:0:2}:$${h:2:2}:$${h:4:2}:$${h:6:2}:$${h:8:2}"'
	EOD
}

##
## Download sc8280xp firmware from radxa-pkg/radxa-firmware into the BSP package
##
function post_family_tweaks_bsp__radxa_dragon_q8b_download_firmware() {
	display_alert "Downloading sc8280xp firmware" "${BOARD}: radxa-pkg/radxa-firmware" "info"
	# Pinned to radxa-pkg/radxa-firmware main as of 2026-06-29 so upstream changes cannot break builds
	declare fw_commit="6a9efd21ebd7"
	declare fw_base_url="https://raw.githubusercontent.com/radxa-pkg/radxa-firmware/${fw_commit}/radxa-firmware-sc8280xp/lib/firmware/qcom"
	declare fw_dest="${destination}/lib/firmware/qcom/sc8280xp"

	run_host_command_logged mkdir -pv "${fw_dest}" "${fw_dest}/radxa/dragon-q8b" "${destination}/lib/firmware/qcom/vpu"

	for fw in qccdsp8280.mbn qcdxkmsuc8280.mbn qcslpi8280.mbn qcvss8280.mbn; do
		run_host_command_logged wget -q --show-progress "${fw_base_url}/sc8280xp/${fw}" -O "${fw_dest}/${fw}"
	done

	run_host_command_logged wget -q --show-progress \
		"${fw_base_url}/sc8280xp/radxa/dragon-q8b/qcadsp8280.mbn" \
		-O "${fw_dest}/radxa/dragon-q8b/qcadsp8280.mbn"

	# Iris VPU firmware for hardware video decode
	run_host_command_logged wget -q --show-progress \
		"${fw_base_url}/vpu/vpu20_p4_gen2_s6.mbn" \
		-O "${destination}/lib/firmware/qcom/vpu/vpu20_p4_gen2_s6.mbn"
}

## Include board-specific firmware in the initrd
function post_family_tweaks_bsp__radxa_dragon_q8b_firmware_in_initrd() {
	display_alert "Adding to bsp-cli" "${BOARD}: board firmware in initrd" "info"
	declare file_added_to_bsp_destination
	add_file_from_stdin_to_bsp_destination "/etc/initramfs-tools/hooks/q8b-firmware" <<- 'FIRMWARE_HOOK'
		#!/bin/bash
		[[ "$1" == "prereqs" ]] && exit 0
		. /usr/share/initramfs-tools/hook-functions
		for f in /lib/firmware/qcom/sc8280xp/*.mbn \
		          /lib/firmware/qcom/sc8280xp/radxa/dragon-q8b/* ; do
			add_firmware "${f#/lib/firmware/}"
		done
		# GPU zap shader (DTS uses the x13s subpath, shipped by armbian-firmware-full)
		add_firmware "qcom/sc8280xp/LENOVO/21BX/qcdxkmsuc8280.mbn"
	FIRMWARE_HOOK
	run_host_command_logged chmod -v +x "${file_added_to_bsp_destination}"
}

