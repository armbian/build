# Allwinner A733 (sun60iw2) SoC family.
#
# Originally derived from Nick Alilovic's sun60iw2 family work for the Radxa
# Cubie A7A/A7Z/A7S (https://github.com/NickAlilovic/build, branch Radxa-A7A).
#
# This file is a pure SoC skeleton: everything board-specific lives in the board
# config (e.g. config/boards/orangepi4pro.csc), which Armbian sources *before*
# this file. A board provides its own kernel source/branch/config/patchdir,
# KERNEL_MAJOR_MINOR, SERIALCON, BOOTSCRIPT, INITRD_ARCH, OFFSET, MODULES, a
# post_family_tweaks__<board>() hook for rootfs tweaks, and its own
# build_custom_uboot__<board>() hook that produces the boot images. HOW the
# bootloader is built is board-specific — e.g. Orange Pi clones its vendor repos
# and compiles U-Boot from source, whereas Radxa would fetch a u-boot .deb — so
# the family carries no builder. The family provides only what is invariant
# across all sun60iw2 boards: the SoC-standard Allwinner boot offsets in
# write_uboot_platform/_mtd below, which flash whatever boot0_*.fex /
# boot_package.fex the board's hook produced.
# Adding another sun60iw2 board needs only a new board file — no edits here.
#

declare -g LINUXFAMILY="sun60iw2"
declare -g ARCH="arm64"
# The vendor U-Boot bundles its own TF-A/BL31 inside boot_package.fex.
declare -g ATF_COMPILE='no'
declare -g KERNEL_BTF="no"
declare -g INSTALL_HEADERS="yes"
# WiFi is handled per-board (in-tree drivers + armbian-firmware); don't build
# Armbian's extra out-of-tree WiFi driver packages.
declare -g EXTRAWIFI="no"
# Board-overridable SoC defaults (board config is sourced first, so these only
# fill gaps a board didn't set):
[[ -z "${BOOTENV_FILE}" ]] && declare -g BOOTENV_FILE='sun60iw2.txt'
[[ -z "${OVERLAY_DIR}" ]] && declare -g OVERLAY_DIR="/boot/dtb/allwinner/overlay"

# SD/eMMC boot layout (Allwinner sunxi64 'h616/h6 loader' path): boot0 at 8 KiB,
# boot_package at 8K*2050 = 16,793,600 bytes. First partition at OFFSET MiB.
# SoC-invariant: every sun60iw2 board's bootloader is written at these offsets,
# regardless of how its build_custom_uboot__<board> hook produced the .fex files.
function write_uboot_platform() {
	local SCRIPT_DIR="$1"
	local DEVICE="$2"

	dd conv=notrunc,fsync status=none if="$SCRIPT_DIR/boot0_sdcard.fex" of="$DEVICE" bs=8k seek=1
	dd conv=notrunc,fsync status=none if="$SCRIPT_DIR/boot_package.fex" of="$DEVICE" bs=8k seek=2050

	sync "${DEVICE}"
}

# SPI NOR boot layout: boot0 at offset 0, boot_package at 262144 (256 KiB).
# Enables armbian-install's "Boot from MTD Flash - system on NVMe". Because the
# A733 BROM checks the SD card before SPI NOR, an inserted bootable SD card
# overrides this -> SD-first, NVMe-as-fallback, and a botched SPI flash is
# recoverable by booting an SD card. Needs mtd-utils in the rootfs (the board's
# post_family_tweaks hook installs it).
function write_uboot_platform_mtd() {
	local SCRIPT_DIR="$1"   # dir holding boot0_spinor.fex + boot_package.fex
	if [[ -c /dev/mtd0 ]]; then
		flash_erase /dev/mtd0 0 0
		mtd_debug write /dev/mtd0 0      "$(stat -c%s "$SCRIPT_DIR/boot0_spinor.fex")" "$SCRIPT_DIR/boot0_spinor.fex"
		mtd_debug write /dev/mtd0 262144 "$(stat -c%s "$SCRIPT_DIR/boot_package.fex")" "$SCRIPT_DIR/boot_package.fex"
		sync
	else
		echo "write_uboot_platform_mtd: /dev/mtd0 not found (no SPI NOR?)" >&2
		return 1
	fi
}
