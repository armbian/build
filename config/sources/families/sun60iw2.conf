# Allwinner A733 (sun60iw2) SoC family.

declare -g LINUXFAMILY="sun60iw2"
declare -g ARCH="arm64"
declare -g ATF_COMPILE="no"
declare -g INSTALL_HEADERS="yes"

declare -g INITRD_ARCH="arm"
declare -g SERIALCON="ttyS0"
declare -g BOOTSCRIPT="boot-sun60iw2.cmd:boot.cmd"
declare -g BOOTENV_FILE="sun60iw2.txt"
declare -g OFFSET=32

# NOTE: Don't swap in an out-of-tree AIC8800 DKMS driver — it shadows the
# in-tree bsp symbols and breaks fdrv ("Unknown symbol").
[[ -z "${MODULES}" ]] && declare -g MODULES="aic8800_bsp aic8800_fdrv aic8800_btlpm"

declare -g KERNELSOURCE="https://github.com/orangepi-xunlong/linux-orangepi.git"
declare -g KERNELBRANCH="branch:orange-pi-6.6-sun60iw2"
declare -g KERNEL_MAJOR_MINOR="6.6"
declare -g LINUXCONFIG="linux-sun60iw2-vendor"

declare -g BOOTSOURCE="https://github.com/orangepi-xunlong/u-boot-orangepi.git"
declare -g BOOTBRANCH="commit:b791be842935b27268ae3d00e943a9075495f30a"   # branch v2018.05-sun60iw2
declare -g BOOTDIR="u-boot-orangepi-sun60iw2"
declare -g UBOOT_GIT_SKIP_SUBMODULES="yes"
declare -g BOOTCONFIG="sun60iw2p1_t736_defconfig"
declare -g UBOOT_COMPILER="arm-linux-gnueabi-"   # vendor U-Boot is 32-bit ARM
declare -g UBOOT_TARGET_MAP=";;boot0_sdcard.fex boot0_spinor.fex boot_package.fex"

declare -g OVERLAY_DIR="/boot/dtb/allwinner/overlay"

# Video output DOES work without GPU acceleration but we still don't want to
# build desktop targets by default.
declare -g HAS_VIDEO_OUTPUT="no"
declare -g FULL_DESKTOP="no"

function add_host_dependencies__sun60iw2_uboot_xxd() {
	# xxd is needed to build vendor U-Boot
	declare -g EXTRA_BUILD_DEPS="${EXTRA_BUILD_DEPS} xxd"
}

function post_config_uboot_target__sun60iw2_vendor_quirks() {
	# The vendor U-Boot tree has some warnings that are treated as errors by newer toolchains. Silence them.
	uboot_cflags_array+=(-fcommon -Wno-error -Wno-attributes -Wno-array-bounds -Wno-maybe-uninitialized -Wno-stringop-overflow)

	# The source tree ships an x86-only scripts/dtc/dtc; rebuild it as arm64
	if ! ./scripts/dtc/dtc --version > /dev/null 2>&1; then
		run_host_command_logged rm -f scripts/dtc/dtc
		# run directly (not run_host_command_logged): HOSTCFLAGS value contains a space
		make -f scripts/Makefile.build obj=scripts/dtc srctree=. objtree="${PWD}" HOSTCC=cc HOSTCFLAGS="-O2 -fcommon" LEX=flex YACC=bison \
			|| exit_with_error "sun60iw2: native scripts/dtc rebuild failed"
	fi
}

function uboot_make_config__sun60iw2_pwd() {
	uboot_make_envs+=("PWD=${PWD}") # Orange Pi U-Boot make expects PWD to be set
}

# Pack the compiled u-boot into the Allwinner boot images using Orange Pi's
# pack-uboot tooling. Produces boot0_sdcard.fex, boot0_spinor.fex, and
# boot_package.fex. Per-board DRAM blobs (boot0 + sys_config) must be provided
# by each board's fetch_custom_uboot hook — there is no default.
function uboot_custom_postprocess() {
	local opi_build_repo="https://github.com/orangepi-xunlong/orangepi-build.git"
	local opi_build_ref="7f776a209b72b92e8c6a06abc83b1e7597eef5af"   # branch next
	local work_dir="$(mktemp -d)"
	local pack_dir="${work_dir}/opibuild/external/packages/pack-uboot"

	# Current dir is the u-boot worktree throughout (we never cd); paths are relative to it.
	[[ -f u-boot.bin ]] || exit_with_error "uboot_custom_postprocess: u-boot.bin not found in u-boot worktree"
	command -v xxd > /dev/null 2>&1 || exit_with_error "uboot_custom_postprocess: missing host tool 'xxd'"

	# Per-board boot blobs provided by each board's fetch_custom_uboot hook.
	[[ -n "${SUNXI_BOOT0_SDCARD_FEX}" && -n "${SUNXI_BOOT0_SPINOR_FEX}" && -n "${SUNXI_SYS_CONFIG_FEX}" ]] \
		|| exit_with_error "sun60iw2: board must set SUNXI_BOOT0_SDCARD_FEX / SUNXI_BOOT0_SPINOR_FEX / SUNXI_SYS_CONFIG_FEX in its fetch_custom_uboot hook"
	[[ -f "${SUNXI_BOOT0_SDCARD_FEX}" ]] || exit_with_error "uboot_custom_postprocess: boot0 sdcard blob not found: ${SUNXI_BOOT0_SDCARD_FEX}"
	[[ -f "${SUNXI_BOOT0_SPINOR_FEX}" ]] || exit_with_error "uboot_custom_postprocess: boot0 spinor blob not found: ${SUNXI_BOOT0_SPINOR_FEX}"
	[[ -f "${SUNXI_SYS_CONFIG_FEX}" ]] || exit_with_error "uboot_custom_postprocess: sys_config blob not found: ${SUNXI_SYS_CONFIG_FEX}"

	# The Allwinner pack tools are x86-only ELF binaries that operate relative to
	# their working directory so we wrap their execution.
	local -a pack_run=(env -u QEMU_CPU -C "${work_dir}")
	if [[ "$(uname -m)" != "x86_64" ]]; then
		local qemu_bin
		qemu_bin="$(command -v qemu-x86_64-static || true)"
		[[ -n "${qemu_bin}" ]] || exit_with_error "uboot_custom_postprocess: qemu-x86_64-static needed on $(uname -m)"
		pack_run+=("${qemu_bin}")
	fi

	display_alert "Cloning pack-uboot from orangepi-build" "${opi_build_ref:0:12}" "info"
	run_host_command_logged git init -q "${work_dir}/opibuild"
	run_host_command_logged git -C "${work_dir}/opibuild" remote add origin "${opi_build_repo}"
	run_host_command_logged git -C "${work_dir}/opibuild" config core.sparseCheckout true
	echo "external/packages/pack-uboot/*" > "${work_dir}/opibuild/.git/info/sparse-checkout"
	run_host_command_logged git -C "${work_dir}/opibuild" fetch -q --depth 1 origin "${opi_build_ref}"
	run_host_command_logged git -C "${work_dir}/opibuild" checkout -q FETCH_HEAD
	[[ -d "${pack_dir}/sun60iw2/bin" && -d "${pack_dir}/tools" ]] || exit_with_error "uboot_custom_postprocess: pack-uboot layout missing in orangepi-build @ ${opi_build_ref}"

	# Stage the shared SoC boot assets (boot_package.cfg, monitor/SCP, dts/) into work_dir.
	display_alert "Packing boot images" "${BOARD}" "info"
	run_host_command_logged cp -r "${pack_dir}/sun60iw2/bin/." "${work_dir}/"

	# DTB: u-boot.dtb -> sunxi.fex
	run_host_command_logged cp u-boot.bin "${work_dir}/u-boot.fex"
	run_host_command_logged ./scripts/dtc/dtc -p 2048 -W no-unit_address_vs_reg -@ -O dtb -o "${work_dir}/uboot.dtb" -b 0 "${work_dir}/dts/u-boot-current.dts"
	run_host_command_logged cp "${work_dir}/uboot.dtb" "${work_dir}/sunxi.fex"
	run_host_command_logged "${pack_run[@]}" "${pack_dir}/tools/update_dtb" sunxi.fex 4096

	# sys_config: sys_config.fex -> sys_config.bin
	run_host_command_logged cp "${SUNXI_SYS_CONFIG_FEX}" "${work_dir}/sys_config.fex"
	sed -i 's/$/\r/' "${work_dir}/sys_config.fex" || exit_with_error "uboot_custom_postprocess: CRLF conversion of sys_config.fex failed"
	run_host_command_logged "${pack_run[@]}" "${pack_dir}/tools/script" sys_config.fex

	# Pack boot images
	run_host_command_logged "${pack_run[@]}" "${pack_dir}/tools/update_uboot" -no_merge u-boot.fex sys_config.bin
	sed -i 's/$/\r/' "${work_dir}/boot_package.cfg" || exit_with_error "uboot_custom_postprocess: CRLF conversion of boot_package.cfg failed"
	run_host_command_logged "${pack_run[@]}" "${pack_dir}/tools/dragonsecboot" -pack boot_package.cfg

	# Deliver images into the worktree (current dir) for UBOOT_TARGET_MAP.
	run_host_command_logged cp "${SUNXI_BOOT0_SDCARD_FEX}" boot0_sdcard.fex
	run_host_command_logged cp "${SUNXI_BOOT0_SPINOR_FEX}" boot0_spinor.fex
	run_host_command_logged cp "${work_dir}/boot_package.fex" boot_package.fex
	[[ -f boot_package.fex && -f boot0_sdcard.fex && -f boot0_spinor.fex ]] \
		|| exit_with_error "uboot_custom_postprocess: packing failed — missing one of boot0_sdcard/boot0_spinor/boot_package .fex"

	rm -rf "${work_dir}"
}

function post_family_tweaks__sun60iw2() {
	display_alert "sun60iw2 rootfs tweaks" "${BOARD}" "info"

	# Link the AIC8800D80 WiFi/BT firmware (shipped by armbian-firmware) to the flat
	# lowercase path the in-tree vendor driver expects.
	if [[ -d "${SDCARD}/lib/firmware/aic8800/SDIO/aic8800D80" ]]; then
		ln -sfn aic8800/SDIO/aic8800D80 "${SDCARD}/lib/firmware/aic8800d80"
	else
		display_alert "aic8800D80 firmware not found in rootfs" "WiFi may not work; check armbian-firmware" "warn"
	fi

	chroot_sdcard_apt_get_install mtd-utils # MTD flash flash_erase/mtd_debug
}

# Add Orange Pi's proprietary kernel headers from bsp/ to the linux-headers package.
function pre_package_kernel_headers__sun60iw2_bsp_include() {
	[[ -d "${kernel_work_dir}/bsp/include" ]] || return 0
	run_host_command_logged cp -rp "${kernel_work_dir}/bsp/include" "${headers_target_dir}/bsp/include"
}
