# Allwinner A733 (sun60iw2) SoC family.

# This file is a pure SoC skeleton: everything board-specific lives in the
# board config (e.g. config/boards/orangepi4pro.csc). The family provides
# only what is invariant across all sun60iw2 boards.

# Adding another sun60iw2 board needs only a new board file — no edits here.

# Most bootloader functionality is currently board specific because it depends
# on vendor provided board-specific U-Boot forks.

declare -g LINUXFAMILY="sun60iw2"
declare -g ARCH="arm64"
declare -g ATF_COMPILE='no'
declare -g KERNEL_BTF="no"
declare -g INSTALL_HEADERS="yes"
declare -g EXTRAWIFI="no"

# Board-overridable SoC defaults (board config is sourced first
[[ -z "${BOOTENV_FILE}" ]] && declare -g BOOTENV_FILE='sun60iw2.txt'
[[ -z "${OVERLAY_DIR}" ]] && declare -g OVERLAY_DIR="/boot/dtb/allwinner/overlay"

# Allwinner sunxi64 'h616/h6 loader' path:
function write_uboot_platform() {
	local SCRIPT_DIR="$1"
	local DEVICE="$2"

	dd conv=notrunc,fsync status=none if="$SCRIPT_DIR/boot0_sdcard.fex" of="$DEVICE" bs=8k seek=1
	dd conv=notrunc,fsync status=none if="$SCRIPT_DIR/boot_package.fex" of="$DEVICE" bs=8k seek=2050

	sync "${DEVICE}"
}

function write_uboot_platform_mtd() {
	local SCRIPT_DIR="$1"   # dir holding boot0_spinor.fex + boot_package.fex
	if [[ -c /dev/mtd0 ]]; then
		flash_erase /dev/mtd0 0 0
		mtd_debug write /dev/mtd0 0      "$(stat -c%s "$SCRIPT_DIR/boot0_spinor.fex")" "$SCRIPT_DIR/boot0_spinor.fex"
		mtd_debug write /dev/mtd0 262144 "$(stat -c%s "$SCRIPT_DIR/boot_package.fex")" "$SCRIPT_DIR/boot_package.fex"
		sync
	else
		echo "write_uboot_platform_mtd: /dev/mtd0 not found (no SPI NOR?)" >&2
		return 1
	fi
}
