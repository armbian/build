declare -g LINUXFAMILY="sc8280xp"
declare -g ARCH="arm64"
declare -g SERIALCON="ttyMSM0"
declare -g BOARD_FIRMWARE_INSTALL="-full"
declare -g UEFI_GRUB_TERMINAL="gfxterm"
declare -g UEFI_GRUB_TIMEOUT=${UEFI_GRUB_TIMEOUT:-3}
declare -g DISTRO_GENERIC_KERNEL=no
declare -g POWER_MANAGEMENT_FEATURES=yes

enable_extension "grub-with-dtb"

case $BRANCH in

	sc8280xp)
		declare -g KERNEL_MAJOR_MINOR="7.0"
		declare -g KERNELSOURCE='https://github.com/steev/linux.git'
		declare -g KERNELBRANCH='branch:lenovo-x13s-linux-7.0.y'
		# LINUXCONFIG intentionally not set: the default (linux-${LINUXFAMILY}-${BRANCH}
		# = linux-sc8280xp-sc8280xp) matches the shipped config file, same as the
		# vendor/edge branches below. The old "linux-${ARCH}-${BRANCH}" override pointed
		# at a non-existent linux-arm64-sc8280xp.config (leftover from the board->family
		# refactor that renamed the configs to linux-sc8280xp-*).
		declare -g GRUB_CMDLINE_LINUX_DEFAULT="clk_ignore_unused pd_ignore_unused arm64.nopauth efi=noruntime"
		;;

	vendor)
		declare -g KERNEL_MAJOR_MINOR="7.0"
		declare -g KERNELSOURCE='https://github.com/radxa/kernel.git'
		declare -g KERNELBRANCH='branch:linux-7.0.11'
		declare -g KERNELPATCHDIR='archive/sc8280xp-vendor'
		declare -g GRUB_CMDLINE_LINUX_DEFAULT="clk_ignore_unused pd_ignore_unused arm64.nopauth efi=noruntime"
		;;

	edge)
		declare -g KERNEL_MAJOR_MINOR="7.1"
		declare -g KERNELPATCHDIR='archive/sc8280xp-edge'
		declare -g GRUB_CMDLINE_LINUX_DEFAULT="clk_ignore_unused pd_ignore_unused arm64.nopauth efi=noruntime"
		;;

esac

family_tweaks_bsp() {
	:
}

function pre_customize_image__disable_few_armbian_services() {
	display_alert "Disabling Armbian services that are not needed for UEFI" "${BOARD}" "info"
	chroot_sdcard systemctl disable armbian-hardware-monitor.service "||" true
	chroot_sdcard systemctl disable armbian-hardware-optimize.service "||" true
	chroot_sdcard systemctl disable armbian-led-state.service "||" true
}

function sc8280xp_is_userspace_supported() {
	[[ "${RELEASE}" == "trixie" || "${RELEASE}" == "sid" || "${RELEASE}" == "noble" || "${RELEASE}" == "oracular" ]] && return 0
	return 1
}

function post_family_config__sc8280xp_userspace_packages() {
	if ! sc8280xp_is_userspace_supported; then
		if [[ "${RELEASE}" != "" ]]; then
			display_alert "Missing userspace for ${BOARD}" "${RELEASE} does not have the userspace necessary to support the ${BOARD}" "warn"
		fi
		return 0
	fi

	display_alert "Setting up common SC8280XP packages for ${BOARD}" "${RELEASE}///${BOARD}" "info"
	add_packages_to_image "bluez" "bluetooth"        # for bluetooth stuff
	add_packages_to_image "protection-domain-mapper" # for charging; see https://packages.ubuntu.com/protection-domain-mapper and https://packages.debian.org/protection-domain-mapper
	add_packages_to_image "qrtr-tools"               # for charging; see https://packages.ubuntu.com/qrtr-tools and https://packages.debian.org/qrtr-tools
	add_packages_to_image "alsa-ucm-conf"            # for audio; see https://packages.ubuntu.com/alsa-ucm-conf and https://packages.debian.org/alsa-ucm-conf
	add_packages_to_image "acpi"                     # general ACPI support
	add_packages_to_image "zstd"                     # for zstd compression of initrd
	add_packages_to_image "mtools"                   # for access to the EFI partition

}

function post_family_tweaks_bsp__sc8280xp_firmware_in_initrd() {
	display_alert "Adding to bsp-cli" "${BOARD}: firmware in initrd" "info"
	declare file_added_to_bsp_destination # will be filled in by add_file_from_stdin_to_bsp_destination
	add_file_from_stdin_to_bsp_destination "/etc/initramfs-tools/hooks/sc8280xp-firmware" <<- 'FIRMWARE_HOOK'
		#!/bin/bash
		[[ "$1" == "prereqs" ]] && exit 0
		. /usr/share/initramfs-tools/hook-functions
		add_firmware "qcom/a660_sqe.fw"  # dpu
		add_firmware "qcom/a660_gmu.bin" # gpu
		add_firmware "qcom/a690_gmu.bin" # gpu (symlink to a660)
	FIRMWARE_HOOK
	run_host_command_logged chmod -v +x "${file_added_to_bsp_destination}"
}

function post_family_tweaks_bsp__sc8280xp_always_start_pdmapper() {
	### (At least) Ubuntu's version of protection-domain-mapper's pd-mapper.service has a kernel condition.
	### On Debian, this does not hurt.
	### Remove it using a systemd override.
	add_file_from_stdin_to_bsp_destination "/etc/systemd/system/pd-mapper.service.d/override.conf" <<- EOD
		[Unit]
		Description=Qualcomm PD mapper service (always starts)
		ConditionKernelVersion=
	EOD
}

# armbian-firstrun waits for systemd to be ready, but snapd.seeded might cause it to hang due to wrong clock.
# if the battery runs out, the clock is reset to 1970. This causes snapd.seeded to hang, and armbian-firstrun to hang.
function pre_customize_image__sc8280xp_disable_snapd_seeded() {
	[[ "${DISTRIBUTION}" != "Ubuntu" ]] && return 0 # only needed for Ubuntu
	display_alert "Disabling snapd.seeded" "${BOARD}" "info"
	chroot_sdcard systemctl disable snapd.seeded.service "||" true
}
