declare -g LINUXFAMILY="imx8ulp"

ARCH="arm64"
KERNEL_IMAGE_TYPE="Image"
OVERLAY_DIR="/boot/dtb/freescale/overlay"
SRC_EXTLINUX="no"
# flash.bin @ sector 66 (33 KiB); 10 MiB reserved before VFAT /boot.
declare -g IMX8ULP_UBOOT_FLASH_SECTOR=66
declare -g OFFSET=10
declare -g BOOTSIZE=128
declare -g BOOTFS_TYPE="fat"
declare -g BOOTSCRIPT="boot-maaxboard-8ulp.cmd:uEnv.txt"
declare -g ATF_SKIP_LDFLAGS_WL="yes"
# Avnet vendor linux-imx 6.1.22 BSP tree: Armbian's mainline archive patches and
# out-of-tree driver harness (EXTRAWIFI) target mainline and don't apply here.
# This also implies EXTRAWIFI=no via common.conf.
declare -g DISABLE_KERNEL_PATCHES="yes"

declare -g ATF_PLAT="imx8ulp"

# i.MX8ULP uses imx-mkimage (not u-boot binman) to assemble flash.bin.
UBOOT_TARGET_MAP="all;;flash.bin"
# silences ATF SCMI/upower INFO spam at boot (INFO needs LOG_LEVEL>=40).
declare -g ATF_LOG_LEVEL=20
ATF_TARGET_MAP="PLAT=${ATF_PLAT} LDFLAGS=-no-warn-rwx-segments bl31;;build/${ATF_PLAT}/release/bl31.bin"

case $BRANCH in
	vendor)
		declare -g KERNEL_MAJOR_MINOR="6.1"
		declare -g KERNELSOURCE='https://github.com/Avnet/linux-imx.git'
		declare -g KERNELBRANCH='commit:78ce688d5a792c053827e1edd4a347807c63c06c'
		;;
esac

case $BOARD in
	maaxboard-8ulp*)
		# Avnet BSP stack (lf-6.1.22-2.0.0)
		IMX_MKIMAGE_BRANCH='commit:5cfd218012e080fb907d9cc301fbb4ece9bc17a9'
		ATFSOURCE='https://github.com/Avnet/imx-atf.git'
		ATFBRANCH='commit:f79eb120d7b08ee02b935b47e934b9ce232cb603'
		BOOTSOURCE='https://github.com/Avnet/uboot-imx.git'
		BOOTBRANCH='commit:2d5adab3314a240be9f23cff80841117849209fd'
		BOOTDIR='u-boot-maaxboard-8ulp'
		;;
esac

function add_host_dependencies__maaxboard_8ulp_bsp_deps() {
	[[ "${BOARD}" == maaxboard-8ulp ]] || return 0
	display_alert "Adding MaaXBoard 8ULP BSP host dependencies" "cmake make gcc-arm-none-eabi libnewlib-dev libnewlib-arm-none-eabi" "info"
	declare -g EXTRA_BUILD_DEPS="${EXTRA_BUILD_DEPS} cmake make gcc-arm-none-eabi libnewlib-dev libnewlib-arm-none-eabi"
}

function _imx8ulp_armgcc_dir_from_debian() {
	local dir="${SRC}/cache/toolchain/armgcc-debian-maaxboard-8ulp"
	local tool

	if [[ -x "${dir}/bin/arm-none-eabi-gcc" ]]; then
		echo "${dir}"
		return 0
	fi

	for tool in arm-none-eabi-gcc arm-none-eabi-g++ arm-none-eabi-objcopy arm-none-eabi-objdump; do
		command -v "${tool}" >/dev/null || exit_with_error "${tool} not found; install gcc-arm-none-eabi"
	done

	mkdir -p "${dir}/bin" "${dir}/arm-none-eabi"
	for tool in arm-none-eabi-gcc arm-none-eabi-g++ arm-none-eabi-objcopy arm-none-eabi-objdump; do
		ln -sfn "$(command -v "${tool}")" "${dir}/bin/${tool}"
	done
	ln -sfn /usr/include/newlib "${dir}/arm-none-eabi/include"
	ln -sfn /usr/lib/arm-none-eabi/newlib "${dir}/arm-none-eabi/lib"
	echo "${dir}"
}

function fetch_sources_tools__maaxboard_8ulp_armgcc_toolchain() {
	[[ "${BOARD}" == maaxboard-8ulp ]] || return 0

	declare tbasedir="${SRC}/cache/toolchain"
	declare tos="x86_64"
	[[ "${HOSTARCH}" == "arm64" ]] && tos="aarch64"

	if [[ "${tos}" == "x86_64" ]]; then
		declare tversion="11.2-2022.02"
		declare tdir="${tbasedir}/gcc-arm-${tversion}-x86_64-arm-none-eabi"
		declare tfile="gcc-arm-${tversion}-x86_64-arm-none-eabi.tar.xz"
		declare turl="https://dl.armbian.com/_toolchain/${tfile}"

		if [[ ! -x "${tdir}/bin/arm-none-eabi-gcc" ]]; then
			display_alert "$BOARD" "Fetching ARM GNU embedded toolchain for M33 firmware" "info"
			mkdir -p "${tbasedir}"
			run_host_command_logged curl -fL#o "${tbasedir}/${tfile}" "${turl}"
			run_host_command_logged tar -C "${tbasedir}" -xf "${tbasedir}/${tfile}"
			run_host_command_logged rm -fv "${tbasedir}/${tfile}"
		fi
		declare -g IMX8ULP_ARMGCC_DIR="${tdir}"
	else
		declare -g IMX8ULP_ARMGCC_DIR="$(_imx8ulp_armgcc_dir_from_debian)"
	fi

	display_alert "$BOARD" "M33 ARMGCC_DIR" "${IMX8ULP_ARMGCC_DIR}" "info"
}

function kernel_make_config__maaxboard_8ulp_kcflags() {
	[[ "${BOARD}" == maaxboard-8ulp ]] || return 0
	# Avnet linux-imx 6.1.22 Vivante driver vs GCC 15 -Werror=enum-int-mismatch.
	declare -g KERNEL_EXTRA_CFLAGS="${KERNEL_EXTRA_CFLAGS:-} -Wno-error=enum-int-mismatch -Wno-enum-int-mismatch"
}

function _imx8ulp_uboot_make_env() {
	declare -a _imx8ulp_uboot_make_env=(
		"PATH='${PATH}'"
		"CCACHE_BASEDIR=$(pwd)"
		"PYTHONPATH=\"${PYTHON3_INFO[MODULES_PATH]}:${PYTHONPATH}\""
	)
	[[ -n "${CCACHE_DIR}" ]] && _imx8ulp_uboot_make_env+=("CCACHE_DIR=${CCACHE_DIR@Q}")
	[[ -n "${CCACHE_TEMPDIR}" ]] && _imx8ulp_uboot_make_env+=("CCACHE_TEMPDIR=${CCACHE_TEMPDIR@Q}")
	echo "${_imx8ulp_uboot_make_env[@]}"
}

function _imx8ulp_prepare_uboot_sources() {
	: "${uboot_git_revision:?uboot_git_revision is not set}"
	display_alert "${uboot_prefix} Checking out U-Boot SHA1 ${uboot_git_revision}" "${BOOTSOURCEDIR}" "info"
	git checkout -f -q "${uboot_git_revision}"
	display_alert "${uboot_prefix} Cleaning U-Boot tree" "${BOOTSOURCEDIR}" "info"
	regular_git clean -xfdq
	maybe_make_clean_uboot
}

function _imx8ulp_build_uboot_arm() {
	local cross_compile uboot_cflags
	cross_compile="CROSS_COMPILE=\"${CCACHE:+$CCACHE }${UBOOT_COMPILER}\""
	uboot_cflags="-fdiagnostics-color=always -Wno-error=maybe-uninitialized -Wno-error=misleading-indentation -Wno-error=attributes -Wno-error=address-of-packed-member"

	display_alert "$BOARD" "Configuring Avnet U-Boot (ARCH=arm) ${BOOTCONFIG}" "" "info"
	run_host_command_logged CCACHE_BASEDIR="$(pwd)" pipetty make ARCH=arm "${BOOTCONFIG}" "${cross_compile}"
	run_host_command_logged CCACHE_BASEDIR="$(pwd)" pipetty make ARCH=arm olddefconfig "${cross_compile}"

	display_alert "$BOARD" "Compiling Avnet U-Boot (ARCH=arm)" "" "info"
	declare -a _uboot_env
	# shellcheck disable=SC2206
	_uboot_env=($(_imx8ulp_uboot_make_env))
	run_host_command_logged env -i "${_uboot_env[@]}" \
		CFLAGS="${uboot_cflags}" KCFLAGS="${uboot_cflags}" \
		pipetty make ARCH=arm all "${cross_compile}"
}

function _imx8ulp_build_m33_fw() {
	local out_dir="$1"
	local m33_dir m33_elf armgcc_dir
	armgcc_dir="${IMX8ULP_ARMGCC_DIR:-}"
	[[ -n "${armgcc_dir}" && -x "${armgcc_dir}/bin/arm-none-eabi-gcc" ]] || armgcc_dir="$(_imx8ulp_armgcc_dir_from_debian)"
	(
		fetch_from_repo "https://github.com/Avnet/mcore_sdk_8ulp.git" "mcore-sdk-8ulp-maaxboard" "commit:f6b1bcceab9e8510a06355c05dfe55c5f87bb9fd"
		m33_dir="${SRC}/cache/sources/mcore-sdk-8ulp-maaxboard"
		cd "${m33_dir}/boards/evkmimx8ulp/multicore_examples/rpmsg_lite_str_echo_rtos/armgcc" || exit 1
		rm -rf CMakeFiles CMakeCache.txt cmake_install.cmake Makefile
		cat > ../version.h <<'EOF'
#define SDK_VERSION "v2.14.0"
#define GIT_VERSION "gf6b1bcceab9e"
EOF
		export ARMGCC_DIR="${armgcc_dir}"
		cmake \
			-DCMAKE_TOOLCHAIN_FILE="../../../../../tools/cmake_toolchain_files/armgcc.cmake" \
			-G "Unix Makefiles" \
			-DCMAKE_BUILD_TYPE=release \
			.
		make -j"$(nproc)"
		m33_elf="release/rpmsg_lite_str_echo_rtos_imxcm33.elf"
		[[ -f "${m33_elf}" ]] || exit 1
		"${armgcc_dir}/bin/arm-none-eabi-objcopy" -Obinary "${m33_elf}" "${out_dir}/m33_image.bin"
	) || exit_with_error "Cortex-M33 firmware build failed for ${BOARD}"
}

function _imx8ulp_verify_download_checksum() {
	local file="$1"
	local expected_sha256="$2"
	local label="$3"

	echo "${expected_sha256}  ${file}" | sha256sum -c - || exit_with_error "Checksum validation failed for ${label}"
}

function _imx8ulp_fetch_boot_firmware() {
	local out_dir="$1"
	local sentinel_pkg="firmware-sentinel-0.10"
	local upower_pkg="firmware-upower-1.3.0"
	local sentinel_sha256="be862b62c849510cce08ec24c1ddf53d826458e326e5a7f09c4b35092d6f9950"
	local upower_sha256="f5271512245fba19536fd096ec547e4e7b558e509f6994100fd701a62e33588f"

	rm -rf "${sentinel_pkg}"* "${upower_pkg}"*
	curl -fL "https://www.nxp.com/lgfiles/NMG/MAD/YOCTO/${sentinel_pkg}.bin" -o "${sentinel_pkg}.bin" || exit_with_error "Download of sentinel AHAB firmware failed"
	_imx8ulp_verify_download_checksum "${sentinel_pkg}.bin" "${sentinel_sha256}" "${sentinel_pkg}.bin"
	chmod +x "${sentinel_pkg}.bin"
	"./${sentinel_pkg}.bin" --auto-accept
	cp "${sentinel_pkg}/mx8ulpa2-ahab-container.img" "${out_dir}/"

	curl -fL "https://www.nxp.com/lgfiles/NMG/MAD/YOCTO/${upower_pkg}.bin" -o "${upower_pkg}.bin" || exit_with_error "Download of upower firmware failed"
	_imx8ulp_verify_download_checksum "${upower_pkg}.bin" "${upower_sha256}" "${upower_pkg}.bin"
	chmod +x "${upower_pkg}.bin"
	"./${upower_pkg}.bin" --auto-accept
	if [[ -f "${upower_pkg}/upower_a1.bin" ]]; then
		cp "${upower_pkg}/upower_a1.bin" "${out_dir}/upower.bin"
	elif [[ -f "${upower_pkg}/upower_a0.bin" ]]; then
		cp "${upower_pkg}/upower_a0.bin" "${out_dir}/upower.bin"
	else
		exit_with_error "No upower firmware blob found in ${upower_pkg}"
	fi
}

function build_custom_uboot__maaxboard_8ulp() {
	[[ "${BOARD}" == maaxboard-8ulp ]] || return 0

	_imx8ulp_prepare_uboot_sources
	[[ $CREATE_PATCHES == yes ]] && return 0

	display_alert "$BOARD" "Building Avnet U-Boot and imx-mkimage flash.bin" "info"

	local uboot_dir mkimage_dir mkimage_rev staging
	uboot_dir="$(pwd)"
	staging="${uboot_dir}/imx8ulp-mkimage-staging"
	rm -rf "${staging}"
	mkdir -p "${staging}/iMX8ULP"

	[[ -d "${atftempdir}" ]] && cp -v "${atftempdir}"/bl31.bin "${staging}/iMX8ULP/"
	[[ -f "${staging}/iMX8ULP/bl31.bin" ]] || exit_with_error "ATF bl31.bin missing for ${BOARD}"

	_imx8ulp_build_uboot_arm

	cp spl/u-boot-spl.bin "${staging}/iMX8ULP/"
	cp u-boot-nodtb.bin "${staging}/iMX8ULP/"
	cp u-boot.bin "${staging}/iMX8ULP/"
	cp arch/arm/dts/maaxboard-8ulp.dtb "${staging}/iMX8ULP/imx8ulp-evk.dtb"
	cp tools/mkimage "${staging}/iMX8ULP/mkimage_uboot"
	chmod 0755 "${staging}/iMX8ULP/mkimage_uboot"

	(
		cd "${staging}" || exit 1
		_imx8ulp_build_m33_fw "${staging}/iMX8ULP"
		_imx8ulp_fetch_boot_firmware "${staging}/iMX8ULP"
	)

	(
		fetch_from_repo "https://github.com/Avnet/imx-mkimage.git" "imx-mkimage-maaxboard-8ulp" "${IMX_MKIMAGE_BRANCH}"
		mkimage_dir="${SRC}/cache/sources/imx-mkimage-maaxboard-8ulp"
		cd "${mkimage_dir}" || exit 1
		mkimage_rev="$(git rev-parse --short=8 HEAD)"
		sed -i "s|git rev-parse --short=8 HEAD|echo ${mkimage_rev}|g" Makefile
		find scripts -type f -executable -exec sed -i '1s|^#!.*python.*|#!/usr/bin/env python3|; 1s|^#!/bin/bash|#!/usr/bin/env bash|' {} + 2>/dev/null || true
		make bin
		make SOC=iMX8ULP mkimage_imx8
		cp -a "${staging}/iMX8ULP/." ./iMX8ULP/
		make SOC=iMX8ULP REV=A2 flash_singleboot_m33
		[[ -f iMX8ULP/flash.bin ]] || exit 1
		cp iMX8ULP/flash.bin "${uboot_dir}/flash.bin"
	) || exit_with_error "imx-mkimage flash.bin build failed for ${BOARD}"

	loop_over_uboot_targets_and_do deploy_built_uboot_bins_for_one_target_to_packaging_area
	declare -g EXTENSION_BUILT_UBOOT=yes
}

function _imx8ulp_maaxboard_fat_boot_paths() {
	# DTB stays on SDCARD during image build; VFAT /boot is pruned before initramfs.
	declare -g IMX8ULP_MAAXBOARD_DTB_SRC="${SDCARD}/boot/dtb/freescale/maaxboard-8ulp.dtb"
}

function post_family_tweaks_bsp__maaxboard_8ulp_boot() {
	[[ "${BOARD}" == maaxboard-8ulp ]] || return 0
	# uEnv.txt boots a gzip initrd named "initrd"; skip u-boot mkimage uInitrd conversion.
	if [[ -f "${destination}/etc/initramfs/post-update.d/99-uboot" ]]; then
		run_host_command_logged rm -fv "${destination}/etc/initramfs/post-update.d/99-uboot"
	fi
	return 0
}

function pre_update_initramfs__maaxboard_8ulp_fat_boot() {
	[[ "${BOARD}" == maaxboard-8ulp ]] || return 0
	[[ -d "${MOUNT}/boot" ]] || return 0

	_imx8ulp_maaxboard_fat_boot_paths

	# 99-uboot is usually removed in BSP; rm -f either way (do not use [[ -f ]] && cmd: false test exits 1).
	rm -f "${MOUNT}/etc/initramfs/post-update.d/99-uboot"

	# VFAT /boot is only 128 MiB; drop the DTB tree (kept on SDCARD) but keep config-* for update-initramfs.
	if [[ -d "${MOUNT}/boot/dtb" ]]; then
		run_host_command_logged rm -rf "${MOUNT}/boot/dtb"
	fi
	return 0
}

function pre_umount_final_image__maaxboard_8ulp_fat_boot() {
	[[ "${BOARD}" == maaxboard-8ulp ]] || return 0
	[[ -d "${MOUNT}/boot" ]] || return 0

	local kernel_img initrd_img dtb_src staging kver
	_imx8ulp_maaxboard_fat_boot_paths

	if [[ -f "${MOUNT}/boot/Image" ]]; then
		kernel_img="${MOUNT}/boot/Image"
	else
		kernel_img="$(find "${MOUNT}/boot" -maxdepth 1 -name 'vmlinuz-*' -type f 2>/dev/null | sort -V | tail -1)"
	fi
	if [[ "${kernel_img##*/}" == vmlinuz-* ]]; then
		kver="${kernel_img##*/vmlinuz-}"
		initrd_img="${MOUNT}/boot/initrd.img-${kver}"
	else
		initrd_img="$(find "${MOUNT}/boot" -maxdepth 1 -name 'initrd.img-*' -type f 2>/dev/null | sort -V | tail -1)"
	fi
	dtb_src="${IMX8ULP_MAAXBOARD_DTB_SRC}"

	[[ -n "${kernel_img}" && -f "${kernel_img}" ]] || exit_with_error "Kernel image missing in FAT /boot for ${BOARD}"
	[[ -n "${initrd_img}" && -f "${initrd_img}" ]] || exit_with_error "Initrd missing in FAT /boot for ${BOARD}"
	[[ -f "${dtb_src}" ]] || exit_with_error "DTB missing at ${dtb_src} for ${BOARD}"

	staging="$(mktemp -d)"
	run_host_command_logged cp -f "${kernel_img}" "${staging}/Image"
	run_host_command_logged cp -f "${initrd_img}" "${staging}/initrd"
	run_host_command_logged cp -f "${dtb_src}" "${staging}/maaxboard-8ulp.dtb"
	[[ -f "${MOUNT}/boot/uEnv.txt" ]] && run_host_command_logged cp -f "${MOUNT}/boot/uEnv.txt" "${staging}/uEnv.txt"

	# Nix layout: only Image, initrd, DTB, and uEnv.txt on VFAT /boot.
	run_host_command_logged find "${MOUNT}/boot" -mindepth 1 -delete
	run_host_command_logged cp -a "${staging}/." "${MOUNT}/boot/"
	run_host_command_logged rm -rf "${staging}"
	return 0
}

function post_build_image__maaxboard_8ulp_export_flash_bin() {
	[[ "${BOARD}" == maaxboard-8ulp ]] || return 0
	[[ -n "${FINAL_IMAGE_FILE}" ]] || return 0

	local uboot_deb extract_dir flash_src version_base out_flash out_boot
	uboot_deb="${DEB_STORAGE}/${image_artifacts_debs_reversioned["uboot"]}"
	[[ -f "${uboot_deb}" ]] || exit_with_error "U-Boot deb missing for flash.bin export: ${uboot_deb}"

	version_base="$(basename "${FINAL_IMAGE_FILE}" .img)"
	extract_dir="$(mktemp -d)"
	run_host_command_logged dpkg -x "${uboot_deb}" "${extract_dir}"

	flash_src="${extract_dir}/usr/lib/linux-u-boot-${BRANCH}-${BOARD}/flash.bin"
	[[ -f "${flash_src}" ]] || exit_with_error "flash.bin missing in ${uboot_deb}"

	out_flash="${DESTIMG}/${version_base}.flash.bin"
	out_boot="${DESTIMG}/${version_base}.boot.img"
	run_host_command_logged cp -v "${flash_src}" "${out_flash}"
	run_host_command_logged cp -v "${flash_src}" "${out_boot}"
	rm -rf "${extract_dir}"

	display_alert "MaaXBoard 8ULP UUU bootloader" "eMMC: sudo uuu -v -b spl ${out_flash}" "info"
	display_alert "MaaXBoard 8ULP SD bootloader" "sudo dd if=${out_flash} of=/dev/sdX bs=512 seek=${IMX8ULP_UBOOT_FLASH_SECTOR} conv=fsync" "info"
	return 0
}

write_uboot_platform() {
	dd if=$1/flash.bin of=$2 bs=512 seek=${IMX8ULP_UBOOT_FLASH_SECTOR} status=noxfer conv=fsync > /dev/null 2>&1
}

family_tweaks_bsp() {
	:
}
