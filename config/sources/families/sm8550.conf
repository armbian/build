declare -g LINUXFAMILY="sm8550"
declare -g OVERLAY_DIR="/boot/dtb/qcom/overlay"
declare -g ARCH="arm64"
declare -g BOOTENV_FILE="qcom-abl.txt"
enable_extension "image-output-abl"

if [ "$BOARD" = "xiaomi-sheng" ]; then
	declare -g KERNELSOURCE="https://github.com/code002-2/sm8550-mainline.git"
	declare -g KERNELBRANCH="sheng-mainline"
	export CC="clang"
	export LLVM=1
else
	case $BRANCH in
		current)
			declare -g KERNEL_MAJOR_MINOR="6.18"
			declare -g KERNELBRANCH='branch:linux-6.18.y'
			declare -g -i KERNEL_GIT_CACHE_TTL=120
			;;

		edge)
			declare -g KERNEL_MAJOR_MINOR="7.0"
			declare -g KERNELBRANCH='branch:linux-7.0.y'
			declare -g -i KERNEL_GIT_CACHE_TTL=120
			;;
	esac
fi

family_tweaks_bsp() {
	:
}
