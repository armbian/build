# NXP LS1046A (Layerscape) family
# Quad Cortex-A72 arm64, DPAA1 with FMAN
#

declare -g ARCH="arm64"
declare -g KERNEL_IMAGE_TYPE="Image"
declare -g SERIALCON="ttyS0"
declare -g SRC_EXTLINUX="yes"
declare -g OFFSET=32 # rootfs partition starts at 32 MiB (bootloader area: PBL@4K, FIP@1M, env@3M, FMAN@4M)
declare -g OVERLAY_DIR="/boot/dtb/freescale/overlay"
declare -g LINUXFAMILY="ls1046a"

# CPU frequency scaling
declare -g CPUMIN=300000
declare -g CPUMAX=1600000
declare -g GOVERNOR=ondemand

# Kernel
declare -g KERNELSOURCE='https://github.com/nxp-qoriq/linux.git'

case "${BRANCH}" in

	current)
		declare -g KERNEL_MAJOR_MINOR="6.12"
		declare -g KERNELBRANCH='tag:lf-6.12.49-2.2.0'
		declare -g LINUXCONFIG="linux-ls1046a-current"
		declare -g KERNEL_DESCRIPTION="NXP Layerscape SDK kernel"
		;;

esac

declare -g KERNELPATCHDIR="archive/ls1046a-${KERNEL_MAJOR_MINOR}"

# U-Boot, ATF, and RCW — must be set by board config (sourced before family)
declare -g BOOTSOURCE="${BOOTSOURCE:?BOOTSOURCE must be set by board config}"
declare -g BOOTBRANCH="${BOOTBRANCH:?BOOTBRANCH must be set by board config}"
declare -g BOOTPATCHDIR="${BOOTPATCHDIR:-u-boot-ls1046a}"
declare -g UBOOT_TARGET_MAP="${UBOOT_TARGET_MAP:?UBOOT_TARGET_MAP must be set by board config}"

declare -g ATFSOURCE="${ATFSOURCE:?ATFSOURCE must be set by board config}"
declare -g ATFDIR="${ATFDIR:-arm-trusted-firmware-ls1046a}"
declare -g ATFBRANCH="${ATFBRANCH:?ATFBRANCH must be set by board config}"
declare -g ATFPATCHDIR="${ATFPATCHDIR:-atf-ls1046a}"

# ATF/RCW platform name and source — must be set by board config
declare -g LS1046A_PLAT="${LS1046A_PLAT:?LS1046A_PLAT must be set by board config}"
declare -g ATF_TARGET_MAP="PLAT=${LS1046A_PLAT} bl31;;build/${LS1046A_PLAT}/release/bl31.bin"

declare -g RCW_SOURCE="${RCW_SOURCE:?RCW_SOURCE must be set by board config}"
declare -g RCW_BRANCH="${RCW_BRANCH:?RCW_BRANCH must be set by board config}"

# FMAN microcode (fetched during family_tweaks)
declare -g FMAN_UCODE_SOURCE='https://github.com/NXP/qoriq-fm-ucode.git'
declare -g FMAN_UCODE_SRCREV='41d603a1ad78e0bb61365500828d9f484bf9bf10'
declare -g FMAN_UCODE_FILE='fsl_fman_ucode_ls1046_r1.0_108_4_9.bin'

# Helper: ensure FMAN microcode is fetched and cached (sets FMAN_UCODE_DIR)
function ensure_fman_ucode_cached() {
	fetch_from_repo "${FMAN_UCODE_SOURCE}" "qoriq-fm-ucode" "commit:${FMAN_UCODE_SRCREV}"
	declare -g FMAN_UCODE_DIR="${SRC}/cache/sources/qoriq-fm-ucode"
}

# RCW build needs tcl
function add_host_dependencies__ls1046a_deps() {
	display_alert "Adding host dependencies for LS1046A" "tcl" "debug"
	declare -g EXTRA_BUILD_DEPS="${EXTRA_BUILD_DEPS} tcl"
}

# After ATF compiles bl31, save the ATF directory path for uboot postprocess
function atf_custom_postprocess() {
	display_alert "ATF BL31 compiled" "saving paths for FIP assembly" "info"
	declare -g ATF_LS1046A_DIR
	ATF_LS1046A_DIR="$(pwd)"
}

function uboot_custom_postprocess() {
	local ubootdir
	ubootdir="$(pwd)"

	display_alert "LS1046A boot chain" "fetching RCW" "info"

	# Fetch and build RCW
	fetch_from_repo "${RCW_SOURCE}" "rcw-ls1046a" "${RCW_BRANCH}" "yes"
	local rcwdir="${SRC}/cache/sources/rcw-ls1046a/${RCW_BRANCH##*:}"
	pushd "${rcwdir}" || exit_with_error "Cannot enter RCW directory"
	run_host_command_logged make BOARDS="${LS1046A_PLAT}"
	popd

	declare -g RCW_BIN_PATH="${RCW_BIN_PATH:?RCW_BIN_PATH must be set by board config}"
	local rcw_bin="${rcwdir}/${LS1046A_PLAT}/${RCW_BIN_PATH}"
	[[ ! -f "${rcw_bin}" ]] && exit_with_error "RCW binary not found at ${rcw_bin}"

	# Re-enter ATF directory and build PBL + FIP with BL33=u-boot.bin
	local atfdir="${ATF_LS1046A_DIR:-${SRC}/cache/sources/${ATFDIR}/${ATFBRANCH##*:}}"
	pushd "${atfdir}" || exit_with_error "Cannot enter ATF directory"

	display_alert "LS1046A boot chain" "building PBL + FIP (emmc)" "info"
	run_host_command_logged make realclean
	run_host_command_logged "CROSS_COMPILE='${ATF_COMPILER}'" \
		"CFLAGS='-fdiagnostics-color=always'" \
		make pbl fip \
		PLAT="${LS1046A_PLAT}" \
		BOOT_MODE=emmc \
		"RCW=${rcw_bin}" \
		"BL33=${ubootdir}/u-boot.bin" \
		"${CTHREADS}"

	# Copy final boot chain binaries to uboot output directory
	run_host_command_logged cp -pv "build/${LS1046A_PLAT}/release/bl2_emmc.pbl" "${ubootdir}/"
	run_host_command_logged cp -pv "build/${LS1046A_PLAT}/release/fip.bin" "${ubootdir}/"

	popd

	# Fetch FMAN microcode and copy to uboot output dir so it gets packaged
	display_alert "LS1046A boot chain" "fetching FMAN microcode" "info"
	ensure_fman_ucode_cached
	run_host_command_logged cp -pv "${FMAN_UCODE_DIR}/${FMAN_UCODE_FILE}" "${ubootdir}/"

	# Build U-Boot environment binary (8KB at 3MB offset on eMMC)
	display_alert "LS1046A boot chain" "building U-Boot environment" "info"
	"${ubootdir}/tools/mkenvimage" -s 0x2000 -o "${ubootdir}/u-boot-env.bin" "${SRC}/config/bootenv/${BOOTENV_FILE:-ls1046a.txt}"

	# Restore cwd — fetch_from_repo changes it, and the framework expects to be in ubootdir
	cd "${ubootdir}" || exit_with_error "Cannot return to U-Boot directory"
}

function write_uboot_platform() {
	# LS1046A eMMC layout:
	# - PBL (RCW + BL2) at 4K offset (block 8)
	# - FIP (BL31 + U-Boot) at 1M offset (block 2048)
	# - U-Boot env at 3M offset (block 6144)
	# - FMAN microcode at 4M offset (block 8192)
	local -a parts=(
		"bl2_emmc.pbl:8"
		"fip.bin:2048"
		"u-boot-env.bin:6144"
		"fsl_fman_ucode_ls1046_r1.0_108_4_9.bin:8192"
	)
	for part in "${parts[@]}"; do
		local file="${part%%:*}" seek="${part##*:}"
		[[ -f "$1/${file}" ]] || { echo "write_uboot_platform: missing $1/${file}" >&2; return 1; }
		dd if="$1/${file}" of="$2" bs=512 seek="${seek}" conv=notrunc status=noxfer > /dev/null 2>&1 || return 1
	done
}

function family_tweaks() {
	# Install FMAN microcode to rootfs
	display_alert "Installing FMAN microcode" "${FMAN_UCODE_FILE}" "info"
	ensure_fman_ucode_cached
	mkdir -p "${SDCARD}/lib/firmware/"
	cp "${FMAN_UCODE_DIR}/${FMAN_UCODE_FILE}" "${SDCARD}/lib/firmware/${FMAN_UCODE_FILE}"
}
