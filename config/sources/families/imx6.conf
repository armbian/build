CPUMIN=392000
CPUMAX=996000
GOVERNOR=interactive
SERIALCON="${SERIALCON:-ttymxc0}"
ARCH=armhf
KERNEL_BTF="no"
# u-boot: mainline v2026.07 for all imx6 boards (builds on trixie, unlike the
# old per-board v2017/v2018 pins). Modern DM/OF_CONTROL -> u-boot-dtb.img; empty
# patchdir; SPL raw-sector load applied by the hook below. Board configs set
# their own BOOTSCRIPT/BOOTENV_FILE (and SERIALCON) and may override these.
BOOTBRANCH="${BOOTBRANCH:-tag:v2026.07}"
BOOTPATCHDIR="${BOOTPATCHDIR:-v2026.07-imx6}"
UBOOT_TARGET_MAP="${UBOOT_TARGET_MAP:-;;SPL:SPL.sdhc u-boot-dtb.img:u-boot.img.sdhc}"

case $BRANCH in

	legacy)

		declare -g KERNEL_MAJOR_MINOR="6.12" # Major and minor versions of this kernel.
		;;

	current)

		declare -g KERNEL_MAJOR_MINOR="6.18" # Major and minor versions of this kernel.
		;;

	edge)

		declare -g KERNEL_MAJOR_MINOR="7.1" # Major and minor versions of this kernel.
		;;

esac

# All imx6 boards run mainline u-boot (DM/OF_CONTROL), whose SPL loads u-boot
# from an EXT4 filesystem - but write_uboot_platform dd's u-boot to a raw 69 KiB
# offset. Force SPL raw-sector load; the MX6 default raw sector 0x8a (=138=69 KiB)
# matches the dd seek exactly.
function post_config_uboot_target__imx6_raw_spl() {
	display_alert "${BOARD}" "SPL raw u-boot load @ sector 0x8a (69 KiB)" "info"
	run_host_command_logged scripts/config --disable CONFIG_SPL_FS_EXT4
	run_host_command_logged scripts/config --disable CONFIG_SPL_FS_FAT
	run_host_command_logged scripts/config --enable CONFIG_SYS_MMCSD_RAW_MODE_U_BOOT_USE_SECTOR
}

write_uboot_platform() {
	dd if=$1/SPL.sdhc of=$2 bs=1K seek=1 status=noxfer > /dev/null 2>&1
	dd if=$1/u-boot.img.sdhc of=$2 bs=1K seek=69 status=noxfer > /dev/null 2>&1
}

family_tweaks_bsp() {
	install -m 644 $SRC/packages/bsp/cubox/99-hdmi_fb0.conf $destination/etc/X11/xorg.conf.d/99-hdmi_fb0.conf
	install -m 755 $SRC/packages/bsp/cubox/brcm_patchram_plus $destination/usr/bin/brcm_patchram_plus
	cp $SRC/packages/bsp/cubox/brcm4330 $destination/etc/default/
	# TODO: replace by a systemd service
	mkdir $destination/etc/init.d/
	install -m 755 $SRC/packages/bsp/cubox/brcm4330-patch $destination/etc/init.d/brcm4330-patch
}
