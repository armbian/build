CPUMIN=392000
CPUMAX=996000
GOVERNOR=interactive
SERIALCON=ttymxc0
ARCH=armhf
KERNEL_BTF="no"
UBOOT_TARGET_MAP=';;SPL:SPL.sdhc u-boot.img:u-boot.img.sdhc'
BOOTPATCHDIR='legacy/u-boot-imx6'

case $BRANCH in

	legacy)

		declare -g KERNEL_MAJOR_MINOR="6.12" # Major and minor versions of this kernel.
		;;

	current)

		declare -g KERNEL_MAJOR_MINOR="6.18" # Major and minor versions of this kernel.
		;;

	edge)

		declare -g KERNEL_MAJOR_MINOR="7.1" # Major and minor versions of this kernel.
		;;

esac

case $BOARD in

	udoo)

		BOOTBRANCH='tag:v2017.11'
		SERIALCON=ttymxc1
		BOOTSCRIPT="boot-udoo.cmd:boot.cmd"
		BOOTENV_FILE='udoo.txt'

		;;

	cubox-i)

		# Bumped off the SolidRun u-boot fork (v2018.01) to mainline v2026.07-rc4
		# (builds on trixie; SolidRun fork does not). mx6cuboxi_defconfig is
		# mainline; SPL reads the SOM EEPROM to auto-pick the board DTB, and one
		# binary serves SD/eMMC/SATA/SPI, so the multi-target map collapses to a
		# single sdhc target. DM/OF_CONTROL -> u-boot-dtb.img. SPL raw-sector
		# load (matching write_uboot_platform's 69 KiB seek) is forced in
		# cubox-i.eos, same as udoo.
		BOOTBRANCH='tag:v2026.07-rc4'
		BOOTPATCHDIR='v2026.07-imx6'
		BOOTSCRIPT='boot-cubox.cmd:boot.cmd'
		BOOTENV_FILE='cubox.txt'
		UBOOT_TARGET_MAP=';;SPL:SPL.sdhc u-boot-dtb.img:u-boot.img.sdhc'

		;;

	wandboard)

		BOOTBRANCH="branch:v2017.03"
		BOOTSCRIPT='boot-udoo.cmd:boot.cmd'
		BOOTENV_FILE='cubox.txt'

		;;

esac

write_uboot_platform() {
	dd if=$1/SPL.sdhc of=$2 bs=1K seek=1 status=noxfer > /dev/null 2>&1
	dd if=$1/u-boot.img.sdhc of=$2 bs=1K seek=69 status=noxfer > /dev/null 2>&1
}

family_tweaks_bsp() {
	install -m 644 $SRC/packages/bsp/cubox/99-hdmi_fb0.conf $destination/etc/X11/xorg.conf.d/99-hdmi_fb0.conf
	install -m 755 $SRC/packages/bsp/cubox/brcm_patchram_plus $destination/usr/bin/brcm_patchram_plus
	cp $SRC/packages/bsp/cubox/brcm4330 $destination/etc/default/
	# TODO: replace by a systemd service
	mkdir $destination/etc/init.d/
	install -m 755 $SRC/packages/bsp/cubox/brcm4330-patch $destination/etc/init.d/brcm4330-patch
}
