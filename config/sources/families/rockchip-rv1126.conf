enable_extension "rkbin-tools"

BOOT_SOC=${BOOT_SOC:="rv1126"}

ARCH=armhf
BOOTDELAY=1
BOOTCONFIG="${BOOTCONFIG:-easy-eai-nano-rv1126_defconfig}"
LINUXFAMILY=rockchip
LINUXCONFIG=linux-rockchip-vendor
OVERLAY_PREFIX=rv1126
SERIALCON="${SERIALCON:-ttyS2:1500000}"
OFFSET=16

RKBIN_GIT_URL="${RKBIN_GIT_URL:-"https://github.com/rockchip-linux/rkbin.git"}"
RKBIN_DIR="$SRC/cache/sources/rkbin-tools"
BOOTSCRIPT="boot-rv1126.cmd:boot.cmd"
BOOTENV_FILE="rv1126.txt"
BOOTSOURCE="https://github.com/radxa/u-boot.git"
BOOTBRANCH="branch:next-dev-buildroot"
BOOTPATCHDIR="legacy/u-boot-rockchip-buildroot"
BOOTDIR="u-boot-rockchip"
SPL_FIT_GENERATOR="arch/arm/mach-rockchip/make_fit_optee.sh"
UBOOT_TARGET_MAP="spl/u-boot-spl.bin u-boot.dtb u-boot-nodtb.bin;;download.bin idblock.img download-emmc.bin idblock-emmc.img u-boot.itb rv1126-flash-layout.txt"

DDR_BLOB="${DDR_BLOB:-"bin/rv11/rv1126_ddr_924MHz_v1.16.bin"}"
TEE_BLOB="${TEE_BLOB:-"bin/rv11/rv1126_tee_ta_v2.16.bin"}"
USBPLUG_BLOB="${USBPLUG_BLOB:-"bin/rv11/rv1126_usbplug_v1.24.bin"}"
MINILOADER_BLOB="${MINILOADER_BLOB:-"bin/rv11/rv1126_spl_emmc_tb_v1.13.bin"}"
RKBOOT_INI="${RKBOOT_INI:-"RKBOOT/RV1126MINIALL.ini"}"
RV1126_BOOT_MEDIA="${RV1126_BOOT_MEDIA:-emmc}"
UBOOT_HASH_EXTRA="${UBOOT_HASH_EXTRA:-} ${DDR_BLOB} ${TEE_BLOB} ${USBPLUG_BLOB} ${MINILOADER_BLOB}"

case $BRANCH in

	vendor)
		declare -g KERNEL_MAJOR_MINOR="6.1"
		declare -g -i KERNEL_GIT_CACHE_TTL=120
		KERNELSOURCE='https://github.com/armbian/linux-rockchip.git'
		KERNELBRANCH='branch:rk-6.1-rkr5.1'
		KERNELPATCHDIR='rv1126-vendor-6.1'
		;;

esac

CPUMIN="408000"
CPUMAX="1512000"
GOVERNOR="ondemand"

function post_config_uboot_target__downgrade_gcc_errors_to_warnings() {

	declare -i gcc_major_version=0
	gcc_major_version=$(gcc -dumpversion | cut -d. -f1)
	display_alert "$BOARD" "GCC major version: ${gcc_major_version}" "debug"

	if [[ ${gcc_major_version} -ge 13 ]]; then
		display_alert "$BOARD" "Adding extra CFLAGS to fix vendor U-Boot building with GCC 13+" "info"
		uboot_cflags_array+=("-Wno-error=enum-int-mismatch")
	fi

	return 0
}

uboot_custom_postprocess() {

	display_alert "Copy TEE blob" "${TEE_BLOB}" "info"
	run_host_command_logged cp "${RKBIN_DIR}/${TEE_BLOB}" tee.bin

	display_alert "Generate u-boot.its" "RV1126 OP-TEE FIT" "info"
	run_host_command_logged $SPL_FIT_GENERATOR -t 0x08400000 -c gzip > u-boot.its

	display_alert "Generate u-boot.itb" "RV1126" "info"
	rm -f u-boot.itb
	run_host_command_logged tools/mkimage -f u-boot.its -E u-boot.itb

	function rv1126_run_boot_merger() {
		local flash_boot="$1"
		local output_path="$2"
		local rkboot_ini_file="$3"

		[[ -f "${flash_boot}" ]] || exit_with_error "Missing RV1126 FlashBoot blob" "${flash_boot}"

		run_host_command_logged cp "${RKBIN_DIR}/${RKBOOT_INI}" "${rkboot_ini_file}"
		sed -i "s|Path1=.*rv1126_ddr.*$|Path1=${RKBIN_DIR}/${DDR_BLOB}|g" "${rkboot_ini_file}"
		sed -i "s|Path1=.*rv1126_usbplug.*$|Path1=${RKBIN_DIR}/${USBPLUG_BLOB}|g" "${rkboot_ini_file}"
		sed -i "s|FlashData=.*$|FlashData=${RKBIN_DIR}/${DDR_BLOB}|g" "${rkboot_ini_file}"
		sed -i "s|FlashBoot=.*$|FlashBoot=${flash_boot}|g" "${rkboot_ini_file}"
		sed -i "s|PATH=.*$|PATH=${output_path}|g" "${rkboot_ini_file}"
		sed -i "s|IDB_PATH=.*$|IDB_PATH=${output_path}|g" "${rkboot_ini_file}"
		grep -q "^IDB_PATH=" "${rkboot_ini_file}" || echo "IDB_PATH=${output_path}" >> "${rkboot_ini_file}"

		rm -f "${output_path}"
		run_host_x86_binary_logged "${RKBIN_DIR}/tools/boot_merger" "${rkboot_ini_file}"
		[[ -s "${output_path}" ]] || exit_with_error "boot_merger did not generate RV1126 loader image" "${output_path}"
		rm -f "${rkboot_ini_file}"
	}

	display_alert "Generate SD download.bin with U-Boot SPL" "RV1126" "debug"
	rv1126_run_boot_merger "./spl/u-boot-spl.bin" "download.bin" "rv1126-sd-download.ini"

	display_alert "Generate SD idblock.img with U-Boot SPL" "RV1126" "debug"
	rv1126_run_boot_merger "./spl/u-boot-spl.bin" "idblock.img" "rv1126-sd-idblock.ini"

	display_alert "Generate eMMC download-emmc.bin with rkbin RV1126 eMMC SPL" "${MINILOADER_BLOB}" "debug"
	rv1126_run_boot_merger "${RKBIN_DIR}/${MINILOADER_BLOB}" "download-emmc.bin" "rv1126-emmc-download.ini"

	display_alert "Generate eMMC idblock-emmc.img with rkbin RV1126 eMMC SPL" "${MINILOADER_BLOB}" "debug"
	rv1126_run_boot_merger "${RKBIN_DIR}/${MINILOADER_BLOB}" "idblock-emmc.img" "rv1126-emmc-idblock.ini"

	cat > rv1126-flash-layout.txt <<- 'RV1126_FLASH_LAYOUT'
		EASY-EAI Nano RV1126 flash layout
		
		For eMMC images, flash the complete Armbian .img at LBA 0x0:
		  eMMC loader/IDB: idblock-emmc.img at LBA 0x40
		                   built from rkbin bin/rv11/rv1126_spl_emmc_tb_v1.13.bin
		  U-Boot FIT:      u-boot.itb at LBA 0x4000
		  rootfs GPT:      first partition starts at LBA 0x8000

		For SD-card debugging, build with RV1126_BOOT_MEDIA=sd:
		  SD loader/IDB: idblock.img at LBA 0x40
		  U-Boot FIT:    u-boot.itb at LBA 0x4000
	RV1126_FLASH_LAYOUT
}

write_uboot_platform() {
	local logging_prelude=""
	[[ $(type -t run_host_command_logged) == function ]] && logging_prelude="run_host_command_logged"

	local idblock="idblock-emmc.img"
	if [[ "${RV1126_BOOT_MEDIA:-emmc}" == "sd" ]]; then
		idblock="idblock.img"
	fi

	[[ -f "$1/${idblock}" ]] || { echo "write_uboot_platform: missing $1/${idblock}" >&2; return 1; }
	[[ -f "$1/u-boot.itb" ]] || { echo "write_uboot_platform: missing $1/u-boot.itb" >&2; return 1; }

	${logging_prelude} dd "if=$1/${idblock}" "of=$2" bs=512 seek=$((0x40)) conv=notrunc status=none
	${logging_prelude} dd "if=$1/u-boot.itb" "of=$2" bs=512 seek=$((0x4000)) conv=notrunc status=none
}

family_tweaks() {
	chroot_sdcard getent group gpio > /dev/null || chroot_sdcard groupadd --system --gid 900 gpio
	chroot_sdcard getent group i2c > /dev/null || chroot_sdcard groupadd --system --gid 901 i2c

	return 0
}

family_tweaks_bsp() {
	mkdir -p $destination/etc/udev/rules.d
	mkdir -p $destination/usr/local/bin

	cp $SRC/packages/bsp/rockchip/70-gpio.rules $destination/etc/udev/rules.d
	cp $SRC/packages/bsp/rockchip/71-i2c.rules $destination/etc/udev/rules.d
	cp $SRC/packages/bsp/rockchip/asound.conf $destination/etc/

	return 0
}
