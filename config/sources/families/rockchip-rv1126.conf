enable_extension "rkbin-tools"

BOOT_SOC=${BOOT_SOC:="rv1126"}

ARCH=armhf
BOOTDELAY=1
BOOTCONFIG="${BOOTCONFIG:-easy-eai-nano-rv1126_defconfig}"
LINUXFAMILY=rockchip-rv1126
LINUXCONFIG=linux-rockchip-rv1126-vendor
OVERLAY_PREFIX=rv1126
SERIALCON="${SERIALCON:-ttyS2:1500000}"
OFFSET=16

RKBIN_GIT_URL="${RKBIN_GIT_URL:-"https://github.com/rockchip-linux/rkbin.git"}"
RKBIN_DIR="$SRC/cache/sources/rkbin-tools"
BOOTSCRIPT="boot-rv1126.cmd:boot.cmd"
BOOTENV_FILE="rv1126.txt"
BOOTSOURCE="https://github.com/u-boot/u-boot.git"
BOOTBRANCH="tag:v2026.07"
BOOTPATCHDIR="v2026.07"
BOOTDIR="u-boot-rockchip-rv1126-v2026.07"

DDR_BLOB="${DDR_BLOB:-"bin/rv11/rv1126_ddr_924MHz_v1.16.bin"}"
TEE_BLOB="${TEE_BLOB:-"bin/rv11/rv1126_tee_ta_v2.16.bin"}"
UBOOT_TARGET_MAP="ROCKCHIP_TPL=${RKBIN_DIR}/${DDR_BLOB} TEE=${RKBIN_DIR}/${TEE_BLOB};;idbloader.img u-boot.itb u-boot-rockchip.bin"
UBOOT_HASH_EXTRA="${UBOOT_HASH_EXTRA:-} ${DDR_BLOB} ${TEE_BLOB}"

case $BRANCH in

	vendor)
		declare -g KERNEL_MAJOR_MINOR="6.1"
		declare -g -i KERNEL_GIT_CACHE_TTL=120
		KERNELSOURCE='https://github.com/armbian/linux-rockchip.git'
		KERNELBRANCH='branch:rk-6.1-rkr5.1'
		KERNELPATCHDIR='rv1126-vendor-6.1'
		;;

esac

CPUMIN="408000"
CPUMAX="1512000"
GOVERNOR="ondemand"

function uboot_make_config__rv1126_v2026_07_target_olddefconfig() {
	[[ "${BOOTPATCHDIR}" == "v2026.07" ]] || return 0

	display_alert "Completing RV1126 u-boot defaults" "${version} ${target_make}" "info"
	run_host_command_logged "make ${target_make} olddefconfig ${cross_compile}"
}

uboot_custom_postprocess() {
	[[ "${BOOTPATCHDIR}" == "v2026.07" ]] || return 0

	for artifact in idbloader.img u-boot.itb u-boot-rockchip.bin spl/u-boot-spl.bin; do
		[[ -s "${artifact}" ]] || exit_with_error "RV1126 mainline u-boot artifact is missing or empty: ${artifact}"
	done

	if command -v strings > /dev/null 2>&1; then
		strings idbloader.img | grep -q "U-Boot SPL 2017.09" && exit_with_error "RV1126 idbloader.img contains legacy U-Boot SPL 2017.09"
		strings idbloader.img | grep -q "U-Boot SPL 2026.07" || exit_with_error "RV1126 idbloader.img does not contain U-Boot SPL 2026.07"
	fi

	local dumpimage_cmd=""
	if command -v dumpimage > /dev/null 2>&1; then
		dumpimage_cmd="dumpimage"
	elif [[ -x tools/dumpimage ]]; then
		dumpimage_cmd="./tools/dumpimage"
	fi

	if [[ -n "${dumpimage_cmd}" ]]; then
		local fit_dump
		fit_dump="$(${dumpimage_cmd} -l u-boot.itb 2>&1)" || exit_with_error "RV1126 u-boot.itb dumpimage verification failed"
		grep -q "Load Address:.*0x00600000" <<< "${fit_dump}" || exit_with_error "RV1126 u-boot.itb is missing U-Boot load address 0x00600000"
		grep -q "Entry Point:.*0x00600000" <<< "${fit_dump}" || exit_with_error "RV1126 u-boot.itb is missing U-Boot entry point 0x00600000"
		grep -q "Image .*op-tee" <<< "${fit_dump}" || exit_with_error "RV1126 u-boot.itb is missing OP-TEE image"
		grep -q "Trusted Execution Environment Image" <<< "${fit_dump}" || exit_with_error "RV1126 u-boot.itb OP-TEE image has unexpected type"
	fi
}

write_uboot_platform() {
	local logging_prelude=""
	[[ $(type -t run_host_command_logged) == function ]] && logging_prelude="run_host_command_logged"

	[[ -f "$1/idbloader.img" ]] || { echo "write_uboot_platform: missing $1/idbloader.img" >&2; return 1; }
	[[ -f "$1/u-boot.itb" ]] || { echo "write_uboot_platform: missing $1/u-boot.itb" >&2; return 1; }

	${logging_prelude} dd "if=$1/idbloader.img" "of=$2" bs=512 seek=$((0x40)) conv=notrunc status=none
	${logging_prelude} dd "if=$1/u-boot.itb" "of=$2" bs=512 seek=$((0x4000)) conv=notrunc status=none
}

family_tweaks() {
	chroot_sdcard getent group gpio > /dev/null || chroot_sdcard groupadd --system --gid 900 gpio
	chroot_sdcard getent group i2c > /dev/null || chroot_sdcard groupadd --system --gid 901 i2c

	return 0
}

family_tweaks_bsp() {
	mkdir -p $destination/etc/udev/rules.d
	mkdir -p $destination/usr/local/bin

	cp $SRC/packages/bsp/rockchip/70-gpio.rules $destination/etc/udev/rules.d
	cp $SRC/packages/bsp/rockchip/71-i2c.rules $destination/etc/udev/rules.d
	cp $SRC/packages/bsp/rockchip/60-media.rules $destination/etc/udev/rules.d
	cp $SRC/packages/bsp/rockchip/asound.conf $destination/etc/

	return 0
}
