# Snapdragon 8 Gen 2 (SM8550) source configuration

KERNELSOURCE="https://github.com/code002-2/sm8550-mainline.git"
KERNELBRANCH="sheng-mainline"

KERNEL_CONFIG="linux-qcom-sm8550-edge.config"

export CC="clang"
export LLVM=1

function BOARD_configure_kernel() {
    scripts/config --enable CONFIG_SCSI_UFS_QCOM
    scripts/config --enable CONFIG_PHY_QCOM_QMP_UFS
    scripts/config --enable CONFIG_DRM_MSM
    scripts/config --enable CONFIG_DRM_MSM_DPU
    scripts/config --enable CONFIG_DRM_PANEL_XIAOMI_SHENG
    scripts/config --enable CONFIG_QCOM_SPMI_PMIC
    scripts/config --enable CONFIG_USB_DWC3_QCOM
    
    scripts/config --disable CONFIG_LTO_CLANG_FULL
    scripts/config --disable CONFIG_LTO_CLANG_THIN
    scripts/config --enable CONFIG_LTO_NONE
    scripts/config --disable CONFIG_DEBUG_INFO
    scripts/config --enable CONFIG_DEBUG_INFO_NONE
}
