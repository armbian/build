# Custom kernel config hook to handle firmware
function custom_kernel_config__cix_p1_firmware() {
	if [[ -f .config ]]; then
		### Disable CONFIG_EXTRA_FIRMWARE - firmware will be loaded at runtime from packages
		display_alert "$BOARD" "Disabling embedded firmware (will be loaded at runtime)" "info"
		kernel_config_modifying_hashes+=("CONFIG_EXTRA_FIRMWARE=\"\"")
		run_kernel_make_long_running olddefconfig
	fi
}

family_tweaks() {
	if [[ "${BRANCH}" == "current" ]] || [[ "${BRANCH}" == "edge" ]]; then
		# Grab DPS firmware blob
		display_alert "$BOARD" "Installing DSP firmware" "info"
		curl -fLo "${SDCARD}"/lib/firmware/dsp_fw.bin https://github.com/cixtech/cix_proprietary__cix_proprietary/raw/refs/heads/cix_p1_k6.6_master/cix_proprietary-debs/cix-audio-dsp/usr/lib/firmware/dsp_fw.bin
		# Grab Mali firmware blob and force it into initramfs to allow early loading
		display_alert "$BOARD" "Installing Mali firmware" "info"
		mkdir -p "${SDCARD}"/lib/firmware/arm/mali/arch12.8
		curl -fLo "${SDCARD}"/lib/firmware/arm/mali/arch12.8/mali_csffw.bin https://github.com/armbian/firmware/raw/refs/heads/master/arm/mali/arch12.8/mali_csffw.bin
		mkdir -p "${SDCARD}"/etc/initramfs-tools/hooks
		cat > "${SDCARD}"/etc/initramfs-tools/hooks/mali-firmware <<- 'HOOKEOF'
			#!/bin/sh
			. /usr/share/initramfs-tools/hook-functions
			mkdir -p "${DESTDIR}/lib/firmware/arm/mali/arch12.8"
			cp -p /lib/firmware/arm/mali/arch12.8/mali_csffw.bin "${DESTDIR}/lib/firmware/arm/mali/arch12.8/"
		HOOKEOF
		chmod +x "${SDCARD}"/etc/initramfs-tools/hooks/mali-firmware
	fi
}

# Xorg's auto-detect failed: 6 DRM cards (card0-5), couldn't determine primary
# Using fbdev driver bypasses DRM complexities, uses working /dev/fb0 directly
# fb0 already active at 1920x1080 from console/DRM fbdev emulation
family_tweaks_bsp() {
	mkdir -p "$destination/etc/X11/xorg.conf.d"
	cat <<- EOF > "$destination/etc/X11/xorg.conf.d/50-cix-display.conf"
		Section "Device"
    		Identifier "CIX FBDev"
    		Driver "fbdev"
    		Option "fbdev" "/dev/fb0"
		EndSection

		Section "Screen"
    		Identifier "Default Screen"
    		Device "CIX FBDev"
    		DefaultDepth 24
		EndSection

		Section "ServerLayout"
    		Identifier "Default Layout"
    		Screen "Default Screen"
		EndSection
	EOF
}

# Override configure_grub to prevent unwanted cmdline modifications
configure_grub() {
	display_alert "Extension: grub: Configuring GRUB" "UEFI GRUB (cix-p1 override)" "info"

	# Enable Armbian Wallpaper on GRUB
	if [[ "${VENDOR}" == Armbian ]]; then
		display_alert "Extension: grub: Enabling" "Armbian Wallpaper on GRUB" "info"
		mkdir -p "${MOUNT}"/usr/share/desktop-base/
		cat <<- grubWallpaper >> "${MOUNT}"/usr/share/desktop-base/grub_background.sh
			WALLPAPER=/usr/share/images/grub/wallpaper.png
			COLOR_NORMAL=white/black
			COLOR_HIGHLIGHT=black/white
		grubWallpaper
		run_host_command_logged chmod -v +x "${MOUNT}"/usr/share/desktop-base/grub_background.sh
	fi

	# Write GRUB config WITHOUT modifying GRUB_CMDLINE_LINUX_DEFAULT
	display_alert "Extension: grub: GRUB EFI kernel cmdline" "cmdline '${GRUB_CMDLINE_LINUX_DEFAULT}' distro=${UEFI_GRUB_DISTRO_NAME} timeout=${UEFI_GRUB_TIMEOUT}" ""
	cat <<- grubCfgFrag >> "${MOUNT}"/etc/default/grub.d/98-armbian.cfg
		GRUB_CMDLINE_LINUX_DEFAULT="${GRUB_CMDLINE_LINUX_DEFAULT}"
		GRUB_TIMEOUT_STYLE=menu
		GRUB_TIMEOUT=${UEFI_GRUB_TIMEOUT}
		GRUB_DISTRIBUTOR="${UEFI_GRUB_DISTRO_NAME}"
		GRUB_DISABLE_SUBMENU=y
		GRUB_DISABLE_OS_PROBER=false
		GRUB_FONT="/usr/share/grub/unicode.pf2"
		GRUB_GFXPAYLOAD=keep
		GRUB_DISABLE_UUID=false
		GRUB_DISABLE_LINUX_UUID=false
	grubCfgFrag

	if [[ "a${UEFI_GRUB_DISABLE_OS_PROBER}" != "a" ]]; then
		cat <<- grubCfgFragHostSide >> "${MOUNT}"/etc/default/grub.d/98-armbian.cfg
			GRUB_DISABLE_OS_PROBER=${UEFI_GRUB_DISABLE_OS_PROBER}
		grubCfgFragHostSide
	fi

	if [[ "a${UEFI_GRUB_TERMINAL}" != "a" ]]; then
		cat <<- grubCfgFragTerminal >> "${MOUNT}"/etc/default/grub.d/98-armbian.cfg
			GRUB_TERMINAL="${UEFI_GRUB_TERMINAL}"
		grubCfgFragTerminal
	fi
}
