declare -g LINUXFAMILY="cix-p1"
declare -g ARCH="arm64"
declare -g BOOTCONFIG="none"
declare -g UEFI_GRUB_TIMEOUT=3
declare -g SERIALCON="" # Disable automatic console= parameter additions
declare -g INSTALL_ARMBIAN_FIRMWARE=no
declare -g INSTALL_HEADERS="yes"  # Required for VPU/NPU DKMS

enable_extension "grub"
declare -g GRUB_CMDLINE_LINUX_DEFAULT="efi=noruntime clk_ignore_unused nowatchdog watchdog_dev.handle_boot_enabled=0"
declare -g BOOT_LOGO="no" # Disable boot logo/splash parameters that grub extension adds

case $BRANCH in
	current)
		declare -g KERNEL_MAJOR_MINOR="6.18"
		;;
	edge)
		declare -g KERNEL_MAJOR_MINOR="7.0"
		;;
esac
declare -g LINUXCONFIG="linux-${LINUXFAMILY}-${BRANCH}"
declare -g KERNELPATCHDIR="archive/cix-${KERNEL_MAJOR_MINOR}"


function post_family_tweaks__cix_acpi_mesa_backports() {
	display_alert "Installing mesa-vulkan-drivers from backports" "cix-acpi" "info"

	# Only install on Debian Trixie
	if [[ "${RELEASE}" == "trixie" && "${DISTRIBUTION}" == "Debian" ]]; then
		# Update mesa from backports
		# Note: trixie-backports is already configured by Armbian
		chroot_sdcard_apt_get install -t trixie-backports mesa-vulkan-drivers

		display_alert "mesa-vulkan-drivers installed from trixie-backports" "cix-acpi" "info"
	else
		display_alert "Skipping mesa-vulkan-drivers backports install (not Debian Trixie)" "${RELEASE}" "warn"
	fi
}

MODULES_BLACKLIST="armchina_npu aipu" # NPU driver crashes on boot, blacklist for now

function post_install_kernel_debs__install_cix_vpu_dkms_package() {
	if [[ "${KERNEL_HAS_WORKING_HEADERS}" != "yes" ]]; then
		display_alert "Skipping VPU DKMS" "kernel headers not available" "warn"
		return 0
	fi

	# Get latest build tag from GitHub API
	api_url="https://api.github.com/repos/EvilOlaf/cix_opensource__vpu_driver/releases"
	latest_release=$(curl -s "${api_url}" | jq -r '[.[] | select(.tag_name | startswith("build-"))][0]')
	latest_tag=$(echo "${latest_release}" | jq -r '.tag_name')

	# Extract version from tag: build-cix-vpu-driver-1.0.1-3-9 -> 1.0.1-3
	deb_version=$(echo "${latest_tag}" | sed 's/^build-cix-vpu-driver-//' | sed 's/-[0-9]*$//')

	display_alert "Installing CIX VPU DKMS" "${latest_tag} (deb ${deb_version})" "info"

	# Download VPU driver DKMS package
	vpu_dkms_url="https://github.com/EvilOlaf/cix_opensource__vpu_driver/releases/download/${latest_tag}/cix-vpu-driver-dkms_${deb_version}_all.deb"
	vpu_fw_url="https://github.com/EvilOlaf/cix_opensource__vpu_driver/releases/download/${latest_tag}/cix-vpu-firmware_${deb_version}_all.deb"

	# Optional: use GitHub mirror for faster downloads in China
	if [[ "${GITHUB_MIRROR}" == "ghproxy" ]]; then
		ghproxy_header="https://ghfast.top/"
		vpu_dkms_url=${ghproxy_header}${vpu_dkms_url}
		vpu_fw_url=${ghproxy_header}${vpu_fw_url}
	fi

	use_clean_environment="yes" chroot_sdcard "curl -fLo /tmp/cix-vpu-driver-dkms_${deb_version}_all.deb ${vpu_dkms_url}"
	use_clean_environment="yes" chroot_sdcard "curl -fLo /tmp/cix-vpu-firmware_${deb_version}_all.deb ${vpu_fw_url}"

	declare -ag if_error_find_files_sdcard=("/var/lib/dkms/cix-vpu-driver/*/*/build/*.log")
	use_clean_environment="yes" chroot_sdcard_apt_get_install /tmp/cix-vpu-driver-dkms_${deb_version}_all.deb /tmp/cix-vpu-firmware_${deb_version}_all.deb
	use_clean_environment="yes" chroot_sdcard "rm -f /tmp/cix-vpu*.deb"
}

