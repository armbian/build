config:
  name: rv1126-6.1
  kind: kernel
  type: vendor
  branch: rk-6.1-rkr5.1

  dts-directories:
    - { source: "dt", target: "arch/arm/boot/dts" }

  auto-patch-dt-makefile:
    - { incremental: true, directory: "arch/arm/boot/dts", config-var: "CONFIG_ARCH_ROCKCHIP" }

  patches-to-git:
    do-not-commit-files:
      - "MAINTAINERS"
      - "Documentation/devicetree/bindings/arm/rockchip.yaml"
    do-not-commit-regexes:
      - "^arch/([a-zA-Z0-9]+)/boot/dts/Makefile$"
